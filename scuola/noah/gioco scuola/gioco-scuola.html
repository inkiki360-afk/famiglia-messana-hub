<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noah Racer Club - Sfida di Metà Anno</title>
    <!-- Caricamento Librerie via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Corsivo Scolastico -->
    <link href="https://fonts.googleapis.com/css2?family=Edu+SA+Beginner:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Animazioni personalizzate */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
        }

        .font-cursive {
            font-family: 'Edu SA Beginner', cursive;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Importazione icone (Mocking Lucide-React for CDN usage)
        // Usiamo icone SVG semplici per garantire la compatibilità totale nel file HTML
        const Icon = ({ name, size = 24, className = "" }) => {
            // Semplificazione: usiamo Emoji o SVG inline per le icone principali
            const icons = {
                book: "📖", calc: "🧮", star: "⭐", arrow: "→", check: "✅",
                trophy: "🏆", pencil: "✏️", left: "←", clock: "⏱️", play: "▶️",
                square: "⏹️", chart: "📊", refresh: "🔄", shapes: "📐", circle: "🔴",
                triangle: "▲", wand: "🪄", gamepad: "🎮", gem: "💎", layout: "📂",
                zap: "⚡", crown: "👑", dices: "🎲", binary: "🔢", car: "🏎️", gauge: "⛽"
            };
            return <span className={className} style={{ fontSize: size }}>{icons[name] || "•"}</span>;
        };

        // --- DATI APPLICAZIONE ---
        const CARS = [
            { id: 1, name: "Ferrari F8", color: "text-red-600", bg: "bg-red-50", emoji: "🏎️", desc: "La rossa più veloce del mondo!" },
            { id: 2, name: "Lamborghini Aventador", color: "text-yellow-500", bg: "bg-yellow-50", emoji: "🏎️", desc: "Ruggisce come un toro scatenato." },
            { id: 3, name: "Pagani Huayra", color: "text-slate-400", bg: "bg-slate-100", emoji: "🏎️", desc: "Un capolavoro fatto di vento e carbonio." },
            { id: 4, name: "Bugatti Chiron", color: "text-blue-600", bg: "bg-blue-50", emoji: "🏎️", desc: "Può correre più veloce di un aereo!" },
            { id: 5, name: "Porsche 911 GT3", color: "text-emerald-600", bg: "bg-emerald-50", emoji: "🏎️", desc: "Perfetta per le curve più difficili." },
            { id: 6, name: "Maserati MC20", color: "text-blue-800", bg: "bg-blue-50", emoji: "🏎️", desc: "Il tridente magico sfreccia in pista." },
            { id: 7, name: "McLaren Artura", color: "text-orange-500", bg: "bg-orange-50", emoji: "🏎️", desc: "Leggera come una piuma, veloce come il fulmine." },
            { id: 8, name: "Aston Martin Valkyrie", color: "text-lime-700", bg: "bg-lime-50", emoji: "🏎️", desc: "Sembra l'auto di un supereroe!" },
            { id: 9, name: "Koenigsegg Jesko", color: "text-zinc-500", bg: "bg-zinc-50", emoji: "🏎️", desc: "La regina della velocità svedese!" },
            { id: 10, name: "Ferrari LaFerrari", color: "text-red-700", bg: "bg-red-100", emoji: "🏎️", desc: "Il sogno massimo di ogni pilota." },
            { id: 11, name: "Lamborghini Huracán STO", color: "text-cyan-500", bg: "bg-cyan-50", emoji: "🏎️", desc: "Nata per correre in pista e vincere." },
            { id: 12, name: "Rimac Nevera", color: "text-blue-400", bg: "bg-blue-50", emoji: "⚡", desc: "L'auto elettrica più scattante che esista." },
            { id: 13, name: "Bugatti Veyron", color: "text-blue-900", bg: "bg-blue-100", emoji: "🏎️", desc: "Una leggenda che ha cambiato la storia." },
            { id: 14, name: "Mercedes-AMG One", color: "text-slate-500", bg: "bg-slate-200", emoji: "🏎️", desc: "Un motore da Formula 1 per la strada!" },
            { id: 15, name: "Ford GT", color: "text-blue-700", bg: "bg-blue-50", emoji: "🏎️", desc: "Bassa, larga e incredibilmente aerodinamica." },
            { id: 16, name: "Lexus LFA", color: "text-white", bg: "bg-slate-50", emoji: "🏎️", desc: "Il suo motore suona come una musica!" },
            { id: 17, name: "Pagani Zonda", color: "text-purple-600", bg: "bg-purple-50", emoji: "🏎️", desc: "Unica, rara e dal suono magico." },
            { id: 18, name: "Audi R8 V10", color: "text-gray-600", bg: "bg-gray-50", emoji: "🏎️", desc: "Tecnologia pura che corre veloce." },
            { id: 19, name: "Lotus Evija", color: "text-green-800", bg: "bg-green-100", emoji: "🏎️", desc: "Sembra arrivare dal futuro!" },
            { id: 20, name: "Nissan GT-R Nismo", color: "text-red-500", bg: "bg-red-50", emoji: "🏎️", desc: "Il mostro giapponese delle corse." }
        ];

        const FABLES_LIBRARY = [
            { title: "La Gara del Deserto", text: "IL SOLE SCALDA LA SABBIA GIALLA. UNA MACCHINA ROSSA CORRE VELOCE TRA LE DUNE. NOAH GUIDA CON FORZA E VINCE LA COPPA D'ORO.", syllables: 34 },
            { title: "Il Draghetto e il Fulmine", text: "UN DRAGO VUOLE VOLARE PIU VELOCE DEL FULMINE. SI METTE UN CASCO BLU E SALTA SULLA NUVOLA. IL VENTO SOFFIA E LO PORTA LONTANO.", syllables: 33 },
            { title: "La Balena Blu", text: "UNA GRANDE BALENA NUOTA SOTTO IL GHIACCIO. CERCA IL SUO AMICO PESCIOLINO PER GIOCARE A NASCONDINO. L'ACQUA E FREDDA MA IL SOLE SCALDA TUTTI.", syllables: 35 },
            { title: "Il Robot Meccanico", text: "IL ROBOT GIRA LA CHIAVE NEL MOTORE. SI SENTE UN RUMORE FORTE: BRUM BRUM. ORA LA MACCHINA E PRONTA PER LA SFIDA IN PISTA.", syllables: 32 }
        ];

        const GRAMMAR_POOL = [
            { word: "PILOTA", type: "NOME" }, { word: "GUIDA", type: "VERBO" },
            { word: "MOTORE", type: "NOME" }, { word: "ACCELERA", type: "VERBO" },
            { word: "PISTA", type: "NOME" }, { word: "FRENA", type: "VERBO" },
            { word: "VOLANTE", type: "NOME" }, { word: "STERZA", type: "VERBO" },
            { word: "GARA", type: "NOME" }, { word: "PARTECIPA", type: "VERBO" }
        ];

        // --- COMPONENTE VIDEOGIOCO ---
        const CaterpillarGame = ({ onFinish, cursiveClass }) => {
            const GRID_SIZE = 12;
            const [snake, setSnake] = useState([{ x: 6, y: 6 }, { x: 6, y: 7 }]);
            const [food, setFood] = useState({ x: 3, y: 3 });
            const [dir, setDir] = useState({ x: 0, y: -1 });
            const [gameScore, setGameScore] = useState(0);

            useEffect(() => {
                const moveInterval = setInterval(() => {
                    setSnake(prev => {
                        let nextX = prev[0].x + dir.x;
                        let nextY = prev[0].y + dir.y;
                        if (nextX < 0) nextX = GRID_SIZE - 1;
                        if (nextX >= GRID_SIZE) nextX = 0;
                        if (nextY < 0) nextY = GRID_SIZE - 1;
                        if (nextY >= GRID_SIZE) nextY = 0;
                        const newHead = { x: nextX, y: nextY };
                        const ateFood = newHead.x === food.x && newHead.y === food.y;
                        const newSnake = [newHead, ...prev];
                        if (ateFood) {
                            setGameScore(s => s + 10);
                            setFood({ x: Math.floor(Math.random() * GRID_SIZE), y: Math.floor(Math.random() * GRID_SIZE) });
                        } else {
                            newSnake.pop();
                        }
                        return newSnake;
                    });
                }, 250);
                return () => clearInterval(moveInterval);
            }, [dir, food]);

            useEffect(() => {
                const handleKey = (e) => {
                    switch(e.key) {
                        case 'ArrowUp': if (dir.y !== 1) setDir({x: 0, y: -1}); break;
                        case 'ArrowDown': if (dir.y !== -1) setDir({x: 0, y: 1}); break;
                        case 'ArrowLeft': if (dir.x !== 1) setDir({x: -1, y: 0}); break;
                        case 'ArrowRight': if (dir.x !== -1) setDir({x: 1, y: 0}); break;
                    }
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [dir]);

            const cellSize = 280 / GRID_SIZE;

            return (
                <div className="flex flex-col items-center">
                    <div className={`flex justify-between w-full mb-4 px-4 ${cursiveClass} text-2xl text-green-700`}>
                        <span>Punti: {gameScore}</span>
                        <span>Guida il bruco!</span>
                    </div>
                    <div className="relative bg-green-50 rounded-2xl overflow-hidden border-4 border-green-200 shadow-inner" style={{ width: 280, height: 280 }}>
                        {snake.map((p, i) => (
                            <div key={i} className={`absolute rounded-full transition-all duration-200 ${i === 0 ? 'bg-green-600 z-10' : 'bg-green-400 opacity-80'}`}
                                style={{ width: cellSize - 2, height: cellSize - 2, left: p.x * cellSize + 1, top: p.y * cellSize + 1 }}>
                                {i === 0 && <div className="flex gap-1 justify-center pt-1.5"><div className="w-1.5 h-1.5 bg-white rounded-full"></div><div className="w-1.5 h-1.5 bg-white rounded-full"></div></div>}
                            </div>
                        ))}
                        <div className="absolute bg-orange-500 rounded-full animate-bounce flex items-center justify-center border-2 border-white shadow-sm"
                            style={{ width: cellSize, height: cellSize, left: food.x * cellSize, top: food.y * cellSize }}>
                            <span className="text-xl">🐛</span>
                        </div>
                    </div>
                    <button onClick={onFinish} className={`mt-8 bg-slate-800 text-white px-8 py-3 rounded-full text-2xl ${cursiveClass} shadow-lg active:scale-95 transition-all`}>Menu</button>
                </div>
            );
        };

        // --- APP PRINCIPALE ---
        const App = () => {
            const [view, setView] = useState('home'); 
            const [garage, setGarage] = useState([]); 
            const [showReward, setShowReward] = useState(null);

            const [activeStory, setActiveStory] = useState(FABLES_LIBRARY[0]);
            const [readingTime, setReadingTime] = useState(0);
            const [isReading, setIsReading] = useState(false);
            const [readingFinished, setReadingFinished] = useState(false);
            
            const [currentGrammarSet, setCurrentGrammarSet] = useState([]);
            const [grammarIdx, setGrammarIdx] = useState(0);
            
            const [mathTasks, setMathTasks] = useState([]);
            const [mathIdx, setMathIdx] = useState(0);

            const [evenOddTasks, setEvenOddTasks] = useState([]);
            const [evenOddIdx, setEvenOddIdx] = useState(0);

            const cursiveClass = "font-cursive leading-relaxed font-bold tracking-wide";
            const timerRef = useRef(null);

            const winCar = () => {
                const available = CARS.filter(c => !garage.includes(c.id));
                if (available.length > 0) {
                    const lucky = available[Math.floor(Math.random() * available.length)];
                    setGarage([...garage, lucky.id]);
                    setShowReward(lucky);
                }
            };

            const prepareGrammarSession = () => {
                const shuffled = [...GRAMMAR_POOL].sort(() => 0.5 - Math.random());
                setCurrentGrammarSet(shuffled.slice(0, 10)); 
                setGrammarIdx(0);
                setView('grammar');
            };

            const prepareMathSession = () => {
                const tasks = [];
                for(let i=0; i<10; i++) {
                    const type = Math.random() > 0.5 ? '+' : '-';
                    let a, b, res;
                    if(type === '+') {
                        a = Math.floor(Math.random() * 11) + 2; 
                        b = Math.floor(Math.random() * 9) + 1; 
                        res = a + b;
                    } else {
                        a = Math.floor(Math.random() * 11) + 10; 
                        b = Math.floor(Math.random() * 10) + 1; 
                        res = a - b;
                    }
                    tasks.push({ q: `${a} ${type} ${b}`, res: res });
                }
                setMathTasks(tasks);
                setMathIdx(0);
                setView('math');
            };

            const prepareEvenOddSession = () => {
                const tasks = [];
                for(let i=0; i<10; i++) {
                    const num = Math.floor(Math.random() * 40) + 1;
                    tasks.push({ val: num, isEven: num % 2 === 0 });
                }
                setEvenOddTasks(tasks);
                setEvenOddIdx(0);
                setView('even-odd');
            };

            const handleReadingStop = () => {
                clearInterval(timerRef.current);
                setIsReading(false);
                setReadingFinished(true);
            };

            const resetReading = () => {
                setReadingTime(0);
                setIsReading(false);
                setReadingFinished(false);
            };

            const handleGrammarChoice = (type) => {
                if (type === currentGrammarSet[grammarIdx].type) {
                    if (grammarIdx < currentGrammarSet.length - 1) setGrammarIdx(grammarIdx + 1);
                    else { winCar(); setView('home'); }
                }
            };

            const handleMathChoice = (val) => {
                if (val === mathTasks[mathIdx].res) {
                    if (mathIdx < mathTasks.length - 1) setMathIdx(mathIdx + 1);
                    else { winCar(); setView('home'); }
                }
            };

            const handleEvenOddChoice = (isEven) => {
                if (isEven === evenOddTasks[evenOddIdx].isEven) {
                    if (evenOddIdx < evenOddTasks.length - 1) setEvenOddIdx(evenOddIdx + 1);
                    else { winCar(); setView('home'); }
                }
            };

            return (
                <div className="min-h-screen pb-10">
                    <header className="bg-slate-900 border-b-4 border-red-600 p-4 sticky top-0 z-20 flex justify-between items-center max-w-2xl mx-auto w-full shadow-xl">
                        <div className="flex items-center gap-2">
                            <Icon name="gauge" className="text-red-600" size={30} />
                            <h1 className="font-black text-white text-xl uppercase tracking-tighter italic">Noah Racer Club</h1>
                        </div>
                        <button onClick={() => setView('garage')} className="bg-yellow-400 text-slate-900 px-4 py-1.5 rounded-full text-xs font-bold border-2 border-yellow-200">
                            🏎️ GARAGE ({garage.length}/{CARS.length})
                        </button>
                    </header>

                    <main className="max-w-xl mx-auto p-4 mt-2">
                        {view === 'home' && (
                            <div className="space-y-6">
                                <section className="bg-gradient-to-br from-red-600 to-black rounded-[40px] p-10 text-white shadow-2xl text-center border-b-8 border-red-900">
                                    <h2 className={`${cursiveClass} text-5xl mb-2 italic`}>Ciao Noah! 🏎️</h2>
                                    <p className={`${cursiveClass} text-2xl opacity-90`}>Completa le sfide e vinci supercar leggendarie!</p>
                                </section>

                                <div className="grid grid-cols-2 gap-4 text-center">
                                    <button onClick={() => { setView('reading'); resetReading(); }} className="bg-white p-6 rounded-[32px] border-4 border-red-100 flex flex-col items-center hover:border-red-400 active:scale-95 transition-all">
                                        <div className="bg-red-600 p-4 rounded-2xl text-white mb-2"><Icon name="book" size={30}/></div>
                                        <span className={`${cursiveClass} text-slate-700 text-3xl`}>Favole</span>
                                    </button>
                                    <button onClick={prepareGrammarSession} className="bg-white p-6 rounded-[32px] border-4 border-indigo-100 flex flex-col items-center hover:border-indigo-400 active:scale-95 transition-all">
                                        <div className="bg-indigo-600 p-4 rounded-2xl text-white mb-2"><Icon name="shapes" size={30}/></div>
                                        <span className={`${cursiveClass} text-slate-700 text-3xl`}>Nomi/Verbi</span>
                                    </button>
                                </div>

                                <button onClick={prepareMathSession} className="w-full flex items-center p-6 bg-white border-4 border-orange-100 rounded-[32px] hover:border-orange-400 shadow-sm active:scale-[0.98] transition-all">
                                    <div className="bg-orange-500 p-4 rounded-2xl text-white mr-5"><Icon name="calc" size={30}/></div>
                                    <div className="flex-1 text-left">
                                        <h3 className="font-black text-slate-800 text-base uppercase">Check-up Motore</h3>
                                        <p className={`${cursiveClass} text-orange-500 text-2xl`}>Fai i conti veloci!</p>
                                    </div>
                                </button>

                                <button onClick={prepareEvenOddSession} className="w-full flex items-center p-6 bg-white border-4 border-emerald-100 rounded-[32px] hover:border-emerald-400 shadow-sm active:scale-[0.98] transition-all">
                                    <div className="bg-emerald-500 p-4 rounded-2xl text-white mr-5"><Icon name="binary" size={30}/></div>
                                    <div className="flex-1 text-left">
                                        <h3 className="font-black text-slate-800 text-base uppercase">Pari o Dispari</h3>
                                        <p className={`${cursiveClass} text-emerald-500 text-2xl`}>Numeri veloci!</p>
                                    </div>
                                </button>

                                <button onClick={() => setView('garage')} className="w-full flex items-center justify-between bg-slate-900 text-white p-8 rounded-[40px] border-b-8 border-red-600 active:scale-95 transition-all">
                                    <div className="text-left">
                                        <p className="font-black text-2xl uppercase italic">Il Mio Garage</p>
                                        <p className={`${cursiveClass} text-xl text-yellow-400`}>Guarda i tuoi 20 bolidi!</p>
                                    </div>
                                    <div className="text-4xl font-black">{garage.length}/{CARS.length}</div>
                                </button>
                                
                                <button onClick={() => setView('game')} className="w-full p-4 text-slate-400 border-t border-slate-200 hover:text-slate-600">
                                    <Icon name="gamepad" size={20} /> <span className={cursiveClass}>Pausa ai box col bruco</span>
                                </button>
                            </div>
                        )}

                        {view === 'garage' && (
                            <div className="animate-in slide-in-from-left">
                                <button onClick={() => setView('home')} className={`${cursiveClass} text-2xl mb-6 bg-white px-5 py-2 rounded-full`}>← Menu</button>
                                <div className="bg-slate-900 rounded-[40px] p-8 border-b-8 border-red-600">
                                    <h2 className="font-black text-3xl text-white mb-6 uppercase italic text-center">Showroom Noah 🏆</h2>
                                    <div className="grid grid-cols-2 gap-6">
                                        {CARS.map(c => (
                                            <div key={c.id} className={`p-4 rounded-[32px] border-4 flex flex-col items-center transition-all ${garage.includes(c.id) ? `${c.bg} border-white` : 'bg-slate-800 opacity-30 border-dashed border-slate-700'}`}>
                                                <div className="text-5xl mb-2">{garage.includes(c.id) ? c.emoji : "🏎️"}</div>
                                                <p className="font-black text-xs uppercase text-slate-800">{garage.includes(c.id) ? c.name : "Segreto"}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'reading' && (
                            <div className="text-center">
                                <button onClick={() => setView('home')} className={`${cursiveClass} text-2xl bg-white px-6 py-2 rounded-full mb-6`}>← Menu</button>
                                <div className="bg-white rounded-[40px] p-10 shadow-xl border-b-8 border-red-500">
                                    <h2 className={`${cursiveClass} text-slate-800 text-5xl mb-6`}>{activeStory.title}</h2>
                                    {!readingFinished ? (
                                        <div className="p-10 bg-slate-50 rounded-[32px] border-4 border-dashed border-slate-200 mb-8">
                                            <p className={`${cursiveClass} text-5xl text-indigo-900`}>{activeStory.text.toLowerCase()}</p>
                                        </div>
                                    ) : (
                                        <div className="mb-8">
                                            <div className="bg-slate-900 p-8 rounded-[40px] text-white shadow-xl mb-6 border-t-4 border-red-600">
                                                <Icon name="zap" size={40} className="text-yellow-400 mb-2"/>
                                                <p className={`${cursiveClass} text-3xl`}>Noah, velocità record!</p>
                                                <p className="text-8xl font-black text-yellow-400">{(activeStory.syllables / readingTime).toFixed(2)}</p>
                                                <p className={`${cursiveClass} text-2xl`}>sill/sec</p>
                                            </div>
                                            <button onClick={() => { winCar(); setView('home'); }} className={`${cursiveClass} w-full bg-yellow-400 py-6 rounded-[32px] text-4xl shadow-xl active:scale-95 border-b-8 border-yellow-600`}>Vinci una Supercar!</button>
                                        </div>
                                    )}
                                    {!readingFinished && (
                                        <button onClick={() => { if(!isReading) { setReadingTime(0.1); setIsReading(true); timerRef.current = setInterval(()=>setReadingTime(t=>t+0.1),100); } else handleReadingStop(); }} 
                                            className={`${cursiveClass} w-full ${isReading ? 'bg-red-500' : 'bg-red-600'} text-white py-10 rounded-[40px] text-5xl shadow-xl active:scale-95`}>
                                            {isReading ? 'Traguardo! 🏁' : 'Partenza! 🔥'}
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'grammar' && (
                            <div className="text-center">
                                <button onClick={() => setView('home')} className={`${cursiveClass} text-2xl bg-white px-6 py-2 rounded-full mb-8`}>← Menu</button>
                                <div className="bg-white rounded-[40px] p-10 border-b-8 border-indigo-600">
                                    <span className={`${cursiveClass} text-2xl text-slate-400`}>Pezzo {grammarIdx+1} di 10</span>
                                    <p className={`${cursiveClass} text-8xl text-slate-800 mb-12`}>{currentGrammarSet[grammarIdx].word.toLowerCase()}</p>
                                    <div className="grid grid-cols-2 gap-8">
                                        <button onClick={()=>handleGrammarChoice('NOME')} className="flex flex-col items-center p-8 bg-slate-50 rounded-[40px] border-4 border-slate-100 hover:border-black active:scale-90 transition-all">
                                            <Icon name="triangle" size={60} className="mb-2" />
                                            <span className="font-black text-xs uppercase">Nome</span>
                                        </button>
                                        <button onClick={()=>handleGrammarChoice('VERBO')} className="flex flex-col items-center p-8 bg-slate-50 rounded-[40px] border-4 border-slate-100 hover:border-red-500 active:scale-90 transition-all">
                                            <Icon name="circle" size={60} className="mb-2 text-red-500" />
                                            <span className="font-black text-xs uppercase text-red-600">Verbo</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'math' && (
                            <div className="text-center">
                                <button onClick={() => setView('home')} className={`${cursiveClass} text-2xl bg-white px-6 py-2 rounded-full mb-8`}>← Menu</button>
                                <div className="bg-white rounded-[40px] p-10 border-b-8 border-orange-500">
                                    <p className={`${cursiveClass} text-9xl text-slate-800 mb-12`}>{mathTasks[mathIdx].q}</p>
                                    <div className="grid grid-cols-3 gap-4">
                                        {[mathTasks[mathIdx].res, mathTasks[mathIdx].res+1, mathTasks[mathIdx].res-2, 10, 15, 20].sort((a,b)=>a-b).map((val, i) => (
                                            <button key={i} onClick={()=>handleMathChoice(val)} className="p-8 rounded-3xl text-4xl border-4 border-slate-50 hover:bg-orange-50 active:scale-90 font-black">{val}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'even-odd' && (
                            <div className="text-center">
                                <button onClick={() => setView('home')} className={`${cursiveClass} text-2xl bg-white px-6 py-2 rounded-full mb-8`}>← Menu</button>
                                <div className="bg-white rounded-[40px] p-10 border-b-8 border-emerald-500 text-center">
                                    <p className="text-[10rem] text-slate-900 mb-12 font-black">{evenOddTasks[evenOddIdx].val}</p>
                                    <div className="grid grid-cols-2 gap-8">
                                        <button onClick={()=>handleEvenOddChoice(true)} className="p-10 bg-slate-50 rounded-[40px] border-4 border-slate-100 active:scale-90">
                                            <span className={`${cursiveClass} text-4xl text-emerald-600`}>Pari</span>
                                        </button>
                                        <button onClick={()=>handleEvenOddChoice(false)} className="p-10 bg-slate-50 rounded-[40px] border-4 border-slate-100 active:scale-90">
                                            <span className={`${cursiveClass} text-4xl text-orange-600`}>Dispari</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'game' && (
                            <div className="bg-white rounded-[40px] p-10 shadow-xl border-8 border-green-400">
                                <h2 className="text-4xl font-black text-green-700 mb-10 uppercase italic text-center">Sosta ai Box 🐛</h2>
                                <CaterpillarGame cursiveClass={cursiveClass} onFinish={() => setView('home')} />
                            </div>
                        )}
                    </main>

                    {showReward && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/95 backdrop-blur-xl p-6 text-center">
                            <div className="bg-white rounded-[60px] p-12 max-w-sm w-full shadow-2xl border-[12px] border-red-600 animate-in zoom-in duration-500">
                                <div className="text-9xl mb-8 animate-bounce">{showReward.emoji}</div>
                                <h2 className="font-black text-3xl uppercase mb-2 text-slate-900 italic">Nuovo Bolide!</h2>
                                <p className={`${cursiveClass} text-5xl text-red-600 mb-4`}>{showReward.name}</p>
                                <p className={`${cursiveClass} text-2xl text-slate-500 mb-8 italic px-4 leading-tight`}>"{showReward.desc}"</p>
                                <button onClick={() => setShowReward(null)} className={`${cursiveClass} bg-red-600 text-white w-full py-6 rounded-full text-4xl shadow-xl active:scale-95 transition-all`}>Metti nel Garage!</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
