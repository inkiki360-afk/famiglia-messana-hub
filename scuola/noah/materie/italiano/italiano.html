<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italiano - Spazio Noah - Famiglia Messana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      :root { --warm-white: #fffbf7; --coral: #e07a5f; --text: #3d405b; --text-soft: #6b6d7a; --shadow: rgba(61,64,91,0.12); --radius: 24px; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Nunito", system-ui, sans-serif; background: linear-gradient(160deg, #fef9f3 0%, #f5e6d8 40%, #ede0d4 100%); color: var(--text); min-height: 100vh; line-height: 1.5; }
      .nav { position: sticky; top: 0; z-index: 50; background: rgba(255,251,247,0.9); backdrop-filter: blur(10px); border-bottom: 2px solid rgba(224,122,95,0.2); box-shadow: 0 4px 20px var(--shadow); }
      .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 1rem; height: 64px; display: flex; justify-content: space-between; align-items: center; }
      .nav-logo { font-size: 1.25rem; font-weight: 800; color: var(--text); text-decoration: none; }
      .nav-logo span { color: var(--coral); }
      .nav-links { display: flex; gap: 1.5rem; }
      .nav-links a { color: var(--text-soft); text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: color 0.2s; }
      .nav-links a:hover { color: var(--coral); }
      .nav-toggle { display: none; background: none; border: none; color: var(--text); padding: 0.5rem; cursor: pointer; font-size: 1.25rem; }
      .nav-menu-mobile { display: none; background: var(--warm-white); border-top: 2px solid rgba(224,122,95,0.2); padding: 1rem; flex-direction: column; gap: 0.75rem; }
      .nav-menu-mobile a { color: var(--text-soft); text-decoration: none; font-weight: 600; }
      .nav-menu-mobile.show { display: flex; }
      @media (max-width: 768px) { .nav-links { display: none; } .nav-toggle { display: block; } }
      main { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 3rem; }
      .breadcrumb { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
      .breadcrumb a { color: var(--coral); font-weight: 700; text-decoration: none; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 0.5rem; }
      .breadcrumb a:hover { opacity: 0.85; }
      .breadcrumb span { color: var(--text-soft); }
      .content-card { background: var(--warm-white); border: 2px solid rgba(224,122,95,0.25); border-radius: var(--radius); box-shadow: 0 8px 24px var(--shadow); padding: 2rem; }
      .content-card h1 { font-size: 1.75rem; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
      .content-card h1 i { color: var(--coral); }
      .content-card p { font-size: 1.1rem; color: var(--text); line-height: 1.7; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/famiglia-messana-hub/index.html" class="nav-logo">Famiglia <span>Messana</span></a>
            <div class="nav-links">
                <a href="/famiglia-messana-hub/index.html">Home</a>
                <a href="/scuola/index.html">Scuola</a>
                <a href="/viaggi/index.html">Viaggi</a>
                <a href="/creativita/index.html">Creatività</a>
            </div>
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Apri menu"><i class="fas fa-bars"></i></button>
        </div>
        <div class="nav-menu-mobile" id="nav-menu">
            <a href="/famiglia-messana-hub/index.html">Home</a>
            <a href="/scuola/index.html">Scuola</a>
            <a href="/viaggi/index.html">Viaggi</a>
            <a href="/creativita/index.html">Creatività</a>
        </div>
    </nav>

    <main>
        <div class="breadcrumb">
            <a href="../../../noah.html"><i class="fas fa-arrow-left"></i> Torna a Spazio Noah</a>
            <span>|</span>
            <a href="/famiglia-messana-hub/index.html"><i class="fas fa-home"></i> Home</a>
        </div>
        <article class="content-card">
            <h1><i class="fas fa-book"></i> Italiano</h1>
            <p>Qui troverai appunti, esercizi e materiali didattici di Italiano.</p>
        </article>
    </main>
    <script>
        var t=document.getElementById('nav-toggle'),m=document.getElementById('nav-menu');
        if(t&&m){t.addEventListener('click',function(){m.classList.toggle('show');});m.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){m.classList.remove('show');});});}
    </script>
</body>
</html>
