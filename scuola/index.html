<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scuola - Famiglia Messana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      :root { --cream: #fef9f3; --warm-white: #fffbf7; --coral: #e07a5f; --coral-soft: rgba(224,122,95,0.2); --mustard: #f2cc8f; --text: #3d405b; --text-soft: #6b6d7a; --shadow: rgba(61,64,91,0.12); --radius: 24px; --radius-sm: 14px; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Nunito", system-ui, sans-serif; background: linear-gradient(160deg, #fef9f3 0%, #f5e6d8 40%, #ede0d4 100%); color: var(--text); min-height: 100vh; line-height: 1.5; }
      .nav { position: sticky; top: 0; z-index: 50; background: rgba(255,251,247,0.9); backdrop-filter: blur(10px); border-bottom: 2px solid rgba(224,122,95,0.2); box-shadow: 0 4px 20px var(--shadow); }
      .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 1rem; height: 64px; display: flex; justify-content: space-between; align-items: center; }
      .nav-logo { font-size: 1.25rem; font-weight: 800; color: var(--text); text-decoration: none; }
      .nav-logo span { color: var(--coral); }
      .nav-links { display: flex; gap: 1.5rem; }
      .nav-links a { color: var(--text-soft); text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: color 0.2s; }
      .nav-links a:hover { color: var(--coral); }
      .nav-toggle { display: none; background: none; border: none; color: var(--text); padding: 0.5rem; cursor: pointer; font-size: 1.25rem; }
      .nav-menu-mobile { display: none; background: var(--warm-white); border-top: 2px solid rgba(224,122,95,0.2); padding: 1rem; flex-direction: column; gap: 0.75rem; }
      .nav-menu-mobile a { color: var(--text-soft); text-decoration: none; font-weight: 600; }
      .nav-menu-mobile a:hover { color: var(--coral); }
      .nav-menu-mobile.show { display: flex; }
      @media (max-width: 768px) { .nav-links { display: none; } .nav-toggle { display: block; } }
      main { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 3rem; }
      .page-header { text-align: center; margin-bottom: 2.5rem; }
      .page-header h1 { font-size: 2.25rem; font-weight: 800; color: var(--text); }
      .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
      .card { display: block; text-decoration: none; color: inherit; background: var(--warm-white); border: 2px solid rgba(224,122,95,0.25); border-radius: var(--radius); box-shadow: 0 8px 24px var(--shadow); overflow: hidden; transition: all 0.25s ease; position: relative; }
      .card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--coral), var(--mustard)); opacity: 0; transition: opacity 0.25s; }
      .card:hover { border-color: var(--coral); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(224,122,95,0.2); }
      .card:hover::before { opacity: 1; }
      .card-img { width: 100%; height: 180px; object-fit: cover; border-bottom: 2px solid var(--coral-soft); }
      .card h3 { padding: 1.25rem; text-align: center; font-size: 1.25rem; font-weight: 700; color: var(--text); transition: color 0.2s; }
      .card:hover h3 { color: var(--coral); }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/index.html" class="nav-logo">Famiglia <span>Messana</span></a>
            <div class="nav-links">
                <a href="/index.html">Home</a>
                <a href="index.html">Scuola</a>
                <a href="/viaggi/index.html">Viaggi</a>
                <a href="/creativita/index.html">Creatività</a>
            </div>
            <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Apri menu"><i class="fas fa-bars"></i></button>
        </div>
        <div class="nav-menu-mobile" id="nav-menu">
            <a href="/index.html">Home</a>
            <a href="index.html">Scuola</a>
            <a href="/viaggi/index.html">Viaggi</a>
            <a href="/creativita/index.html">Creatività</a>
        </div>
    </nav>
    <main>
        <header class="page-header">
            <h1>Scuola</h1>
        </header>
        <div class="cards-grid">
            <a class="card" href="nicole.html">
                <img src="../img/Spazio-NIcole.png" alt="Spazio Nicole" class="card-img" loading="lazy">
                <h3>Spazio Nicole</h3>
            </a>
            <a class="card" href="noah.html">
                <img src="../img/Spazio-Noah.png" alt="Spazio Noah" class="card-img" loading="lazy">
                <h3>Spazio Noah</h3>
            </a>
        </div>
    </main>
    <script>
        var t=document.getElementById('nav-toggle'),m=document.getElementById('nav-menu');
        if(t&&m){t.addEventListener('click',function(){m.classList.toggle('show');});m.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){m.classList.remove('show');});});}
    </script>
</body>
</html>
