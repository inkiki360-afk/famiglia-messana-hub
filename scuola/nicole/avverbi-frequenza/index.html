<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avverbi di frequenza – Spazio Nicole</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --cream: #fef9f3;
      --warm: #fffbf7;
      --coral: #e07a5f;
      --coral-soft: rgba(224, 122, 95, 0.25);
      --violet: #9b7ed9;
      --violet-soft: rgba(155, 126, 217, 0.25);
      --sage: #81b29a;
      --sage-soft: rgba(129, 178, 154, 0.3);
      --text: #3d405b;
      --text-soft: #6b6d7a;
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Nunito", system-ui, sans-serif;
      background: linear-gradient(160deg, #fef9f3 0%, #f5e6d8 50%, #ede0d4 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      font-size: 1.1rem;
    }
    .top-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 0.75rem 1rem;
      background: rgba(255,251,247,0.98);
      border-bottom: 2px solid var(--coral-soft);
    }
    .top-nav a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-soft);
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--warm);
      border: 2px solid var(--coral-soft);
      transition: all 0.2s;
    }
    .top-nav a:hover { color: var(--coral); border-color: var(--coral); }
    .app-wrap { max-width: 560px; margin: 0 auto; padding: 1.5rem 1rem 2rem; }
    .page-header { text-align: center; margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.9rem; font-weight: 800; color: var(--text); margin-bottom: 0.25rem; }
    .page-header p { font-size: 1.05rem; color: var(--text-soft); font-weight: 600; }
    .score-bar {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--violet);
      margin-bottom: 1rem;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 1.25rem;
      justify-content: center;
    }
    .tab {
      padding: 12px 18px;
      border-radius: var(--radius);
      border: 2px solid var(--coral-soft);
      background: var(--warm);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab:hover { border-color: var(--coral); color: var(--coral); }
    .tab.active { background: var(--coral); color: white; border-color: var(--coral); }
    .panel { display: none; }
    .panel.active { display: block; }
    .card-box {
      background: var(--warm);
      border: 2px solid var(--coral-soft);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 8px 24px rgba(61,64,91,0.1);
      text-align: center;
    }
    .flashcard {
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: var(--violet);
      cursor: pointer;
      user-select: none;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(155,126,217,0.12), rgba(224,122,95,0.08));
      transition: transform 0.3s;
    }
    .flashcard:hover { transform: scale(1.02); }
    .flashcard.flipped { color: var(--coral); font-size: 1.75rem; }
    .btn-big {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      margin-top: 1rem;
      border-radius: 999px;
      border: none;
      background: var(--coral);
      color: white;
      font-family: inherit;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-big:hover { opacity: 0.9; transform: scale(1.03); }
    .quiz-word { font-size: 1.8rem; font-weight: 800; color: var(--violet); margin-bottom: 1rem; }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; }
    .quiz-opt {
      padding: 16px 20px;
      border-radius: var(--radius);
      border: 2px solid var(--coral-soft);
      background: var(--warm);
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .quiz-opt:hover { border-color: var(--coral); background: var(--coral-soft); }
    .quiz-opt.correct { border-color: var(--sage); background: var(--sage-soft); color: #2d6a4f; }
    .quiz-opt.wrong { border-color: #dc2626; background: rgba(220,38,38,0.15); }
    .feedback-msg { font-size: 1.3rem; font-weight: 800; margin-top: 1rem; }
    .feedback-ok { color: #059669; }
    .feedback-no { color: #dc2626; }
    .match-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }
    .match-item {
      padding: 14px 18px;
      border-radius: var(--radius);
      border: 2px solid var(--coral-soft);
      background: var(--warm);
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .match-item.selected { border-color: var(--violet); background: var(--violet-soft); }
    .match-item.matched { border-color: var(--sage); background: var(--sage-soft); cursor: default; opacity: 0.9; }
    .sentence-box { font-size: 1.35rem; font-weight: 700; margin-bottom: 1rem; line-height: 1.6; }
    .sentence-box .blank {
      display: inline-block;
      min-width: 140px;
      padding: 6px 12px;
      border-bottom: 3px solid var(--violet);
      color: var(--violet);
    }
    .sentence-opts { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 1rem; }
    .sentence-opts button {
      padding: 12px 20px;
      border-radius: 999px;
      border: 2px solid var(--coral-soft);
      background: var(--warm);
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sentence-opts button:hover { border-color: var(--coral); }
    .riepilogo-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1.15rem;
      background: var(--warm);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(61,64,91,0.1);
    }
    .riepilogo-table th, .riepilogo-table td {
      padding: 14px 18px;
      text-align: left;
      border-bottom: 1px solid var(--coral-soft);
    }
    .riepilogo-table th { background: var(--violet-soft); font-weight: 800; color: var(--text); }
    .riepilogo-table tr:last-child td { border-bottom: none; }
    .riepilogo-table td:first-child { font-weight: 700; color: var(--violet); }
  </style>
</head>
<body>
  <nav class="top-nav" aria-label="Navigazione">
    <a href="../../../index.html"><i class="fas fa-home"></i> Home</a>
    <a href="../index.html"><i class="fas fa-user"></i> Spazio Nicole</a>
  </nav>
  <div class="app-wrap">
    <header class="page-header">
      <h1>Avverbi di frequenza</h1>
      <p>Impariamo insieme inglese e italiano</p>
    </header>
    <div class="score-bar" id="score-bar">Risposte giuste: 0 su 0</div>
    <div class="tabs">
      <button type="button" class="tab active" data-mode="flash">Flashcard</button>
      <button type="button" class="tab" data-mode="quiz">Quiz</button>
      <button type="button" class="tab" data-mode="match">Abbina</button>
      <button type="button" class="tab" data-mode="sentence">Completa la frase</button>
      <button type="button" class="tab" data-mode="riepilogo">Riepilogo</button>
    </div>

    <div id="panel-flash" class="panel active">
      <div class="card-box">
        <div class="flashcard" id="flashcard" tabindex="0">Always</div>
        <button type="button" class="btn-big" id="btn-prossima"><i class="fas fa-arrow-right"></i> Prossima</button>
      </div>
    </div>

    <div id="panel-quiz" class="panel">
      <div class="card-box">
        <div class="quiz-word" id="quiz-word"></div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="feedback-msg" id="quiz-feedback" style="display: none;"></div>
        <button type="button" class="btn-big" id="btn-quiz-next" style="display: none;">Prossima <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>

    <div id="panel-match" class="panel">
      <div class="card-box">
        <p style="margin-bottom: 1rem; font-weight: 700;">Clicca una parola inglese e poi la sua traduzione italiana.</p>
        <div id="match-container"></div>
        <div class="feedback-msg" id="match-feedback" style="display: none;"></div>
        <button type="button" class="btn-big" id="btn-match-reset" style="display: none;">Ricomincia</button>
      </div>
    </div>

    <div id="panel-sentence" class="panel">
      <div class="card-box">
        <div class="sentence-box" id="sentence-text"></div>
        <div class="sentence-opts" id="sentence-opts"></div>
        <div class="feedback-msg" id="sentence-feedback" style="display: none;"></div>
        <button type="button" class="btn-big" id="btn-sentence-next" style="display: none;">Prossima <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>

    <div id="panel-riepilogo" class="panel">
      <div class="card-box">
        <h2 style="font-size: 1.3rem; margin-bottom: 1rem;">Scheda da studiare</h2>
        <table class="riepilogo-table">
          <thead><tr><th>Inglese</th><th>Italiano</th></tr></thead>
          <tbody id="riepilogo-body"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var AVVERBI = [
        { en: "Always", it: "Sempre" },
        { en: "Usually", it: "Di solito" },
        { en: "Often", it: "Spesso" },
        { en: "Sometimes", it: "A volte" },
        { en: "Rarely", it: "Raramente" },
        { en: "Never", it: "Mai" },
        { en: "Normally", it: "Normalmente" },
        { en: "Every day", it: "Ogni giorno" },
        { en: "Once a week", it: "Una volta a settimana" }
      ];
      var FRASI = [
        { sentence: "I ___ eat breakfast at home.", correct: "always" },
        { sentence: "She ___ goes to school by car.", correct: "usually" },
        { sentence: "We ___ play in the park.", correct: "often" },
        { sentence: "He ___ eats pizza.", correct: "sometimes" },
        { sentence: "They ___ watch TV.", correct: "rarely" },
        { sentence: "I ___ forget my homework.", correct: "never" }
      ];
      var correctCount = 0, totalCount = 0;
      var flashIndex = 0;
      var quizIndex = 0;
      var sentenceIndex = 0;
      var matchSelectedEn = null;
      var matchPairs = [];
      var matchDone = 0;

      function shuffle(a) {
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
      }
      function updateScore() {
        document.getElementById('score-bar').textContent = "Risposte giuste: " + correctCount + " su " + (totalCount || "");
      }

      document.querySelectorAll('.tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          var mode = tab.getAttribute('data-mode');
          document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
          document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
          tab.classList.add('active');
          document.getElementById('panel-' + mode).classList.add('active');
          if (mode === 'flash') renderFlash();
          if (mode === 'quiz') renderQuiz();
          if (mode === 'match') renderMatch();
          if (mode === 'sentence') renderSentence();
          if (mode === 'riepilogo') renderRiepilogo();
        });
      });

      function renderFlash() {
        var card = document.getElementById('flashcard');
        flashIndex = flashIndex % AVVERBI.length;
        card.textContent = AVVERBI[flashIndex].en;
        card.classList.remove('flipped');
        card.setAttribute('data-italian', AVVERBI[flashIndex].it);
      }
      document.getElementById('flashcard').addEventListener('click', function() {
        if (this.classList.contains('flipped')) return;
        this.textContent = this.getAttribute('data-italian');
        this.classList.add('flipped');
      });
      document.getElementById('btn-prossima').addEventListener('click', function() {
        flashIndex++;
        renderFlash();
      });

      function renderQuiz() {
        var idx = quizIndex % AVVERBI.length;
        var current = AVVERBI[idx];
        var others = AVVERBI.filter(function(_, i) { return i !== idx; });
        var opts = [current.it].concat(shuffle(others.slice(0, 2)).map(function(o) { return o.it; }));
        opts = shuffle(opts);
        document.getElementById('quiz-word').textContent = current.en;
        document.getElementById('quiz-feedback').style.display = 'none';
        document.getElementById('btn-quiz-next').style.display = 'none';
        var container = document.getElementById('quiz-options');
        container.innerHTML = '';
        opts.forEach(function(it) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'quiz-opt';
          btn.textContent = it;
          btn.addEventListener('click', function() {
            if (btn.classList.contains('correct') || btn.classList.contains('wrong')) return;
            totalCount++;
            if (it === current.it) {
              correctCount++;
              btn.classList.add('correct');
              document.getElementById('quiz-feedback').textContent = 'Brava!';
              document.getElementById('quiz-feedback').className = 'feedback-msg feedback-ok';
            } else {
              btn.classList.add('wrong');
              document.getElementById('quiz-feedback').textContent = 'Riprova';
              document.getElementById('quiz-feedback').className = 'feedback-msg feedback-no';
            }
            document.getElementById('quiz-feedback').style.display = 'block';
            document.getElementById('btn-quiz-next').style.display = 'inline-flex';
            updateScore();
          });
          container.appendChild(btn);
        });
      }
      document.getElementById('btn-quiz-next').addEventListener('click', function() {
        quizIndex++;
        renderQuiz();
      });

      function renderMatch() {
        matchPairs = [];
        matchDone = 0;
        matchSelectedEn = null;
        var enShuf = shuffle(AVVERBI.slice().map(function(a) { return a.en; }));
        var itShuf = shuffle(AVVERBI.slice().map(function(a) { return a.it; }));
        var container = document.getElementById('match-container');
        container.innerHTML = '';
        document.getElementById('match-feedback').style.display = 'none';
        document.getElementById('btn-match-reset').style.display = 'none';
        var enEls = [];
        var itEls = [];
          AVVERBI.forEach(function(_, i) {
            var en = enShuf[i];
            var it = itShuf[i];
          var div = document.createElement('div');
          div.className = 'match-row';
          var enBtn = document.createElement('button');
          enBtn.type = 'button';
          enBtn.className = 'match-item';
          enBtn.textContent = en;
          enBtn.dataset.en = en;
          enBtn.addEventListener('click', function() {
            if (enBtn.classList.contains('matched')) return;
            document.querySelectorAll('#match-container .match-item[data-en]').forEach(function(e) { e.classList.remove('selected'); });
            matchSelectedEn = en;
            enBtn.classList.add('selected');
          });
          var itBtn = document.createElement('button');
          itBtn.type = 'button';
          itBtn.className = 'match-item';
          itBtn.textContent = it;
          itBtn.dataset.it = it;
          itBtn.addEventListener('click', function() {
            if (itBtn.classList.contains('matched')) return;
            if (!matchSelectedEn) return;
            var pair = AVVERBI.find(function(a) { return a.en === matchSelectedEn; });
            if (pair && pair.it === itBtn.dataset.it) {
              document.querySelector('#match-container .match-item[data-en="' + matchSelectedEn + '"]').classList.add('matched');
              itBtn.classList.add('matched');
              matchDone++;
              totalCount++; correctCount++;
              document.getElementById('match-feedback').textContent = 'Brava!';
              document.getElementById('match-feedback').className = 'feedback-msg feedback-ok';
              document.getElementById('match-feedback').style.display = 'block';
              updateScore();
              matchSelectedEn = null;
              if (matchDone === AVVERBI.length) {
                document.getElementById('match-feedback').textContent = 'Tutte corrette! Brava!';
                document.getElementById('btn-match-reset').style.display = 'inline-flex';
              }
            } else {
              document.getElementById('match-feedback').textContent = 'Riprova';
              document.getElementById('match-feedback').className = 'feedback-msg feedback-no';
              document.getElementById('match-feedback').style.display = 'block';
              document.querySelectorAll('#match-container .match-item[data-en]').forEach(function(e) { e.classList.remove('selected'); });
              matchSelectedEn = null;
            }
          });
          div.appendChild(enBtn);
          div.appendChild(itBtn);
          container.appendChild(div);
        });
      }
      document.getElementById('btn-match-reset').addEventListener('click', renderMatch);

      function renderSentence() {
        var fr = FRASI[sentenceIndex % FRASI.length];
        var blank = fr.sentence.replace('___', '______');
        document.getElementById('sentence-text').innerHTML = blank.replace('______', '<span class="blank" id="sentence-blank">?</span>');
        document.getElementById('sentence-feedback').style.display = 'none';
        document.getElementById('btn-sentence-next').style.display = 'none';
        var opts = shuffle(AVVERBI.slice().map(function(a) { return a.en.toLowerCase(); }));
        var container = document.getElementById('sentence-opts');
        container.innerHTML = '';
        opts.slice(0, 5).forEach(function(en) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = en.charAt(0).toUpperCase() + en.slice(1);
          btn.addEventListener('click', function() {
            totalCount++;
            if (en === fr.correct) {
              correctCount++;
              document.getElementById('sentence-blank').textContent = btn.textContent;
              document.getElementById('sentence-feedback').textContent = 'Brava!';
              document.getElementById('sentence-feedback').className = 'feedback-msg feedback-ok';
            } else {
              document.getElementById('sentence-feedback').textContent = 'Riprova';
              document.getElementById('sentence-feedback').className = 'feedback-msg feedback-no';
            }
            document.getElementById('sentence-feedback').style.display = 'block';
            document.getElementById('btn-sentence-next').style.display = 'inline-flex';
            updateScore();
          });
          container.appendChild(btn);
        });
      }
      document.getElementById('btn-sentence-next').addEventListener('click', function() {
        sentenceIndex++;
        renderSentence();
      });

      function renderRiepilogo() {
        var tbody = document.getElementById('riepilogo-body');
        tbody.innerHTML = '';
        AVVERBI.forEach(function(a) {
          var tr = document.createElement('tr');
          tr.innerHTML = '<td>' + a.en + '</td><td>' + a.it + '</td>';
          tbody.appendChild(tr);
        });
      }

      renderFlash();
      renderRiepilogo();
    })();
  </script>
</body>
</html>
