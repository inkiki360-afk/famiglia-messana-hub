<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Antico Egitto - Spazio Nicole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #fef3c7; 
            background-image: url("https://www.transparenttextures.com/patterns/sandpaper.png");
        }
        .quiz-card { transition: all 0.3s ease; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover:not(:disabled) {
            transform: translateX(10px);
            background-color: #fef3c7;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 pt-8">

    <nav class="mb-8 w-full max-w-2xl flex items-center justify-between text-amber-900 font-semibold bg-white/60 backdrop-blur-md p-4 rounded-2xl shadow-sm border border-amber-100">
        <div class="flex items-center space-x-2 text-sm">
            <a href="../../../../index.html" class="hover:text-blue-600 transition-colors">Home</a>
            <i class="fas fa-chevron-right text-xs text-amber-400"></i>
            <a href="../../storia.html" class="hover:text-blue-600 transition-colors">Storia</a>
            <i class="fas fa-chevron-right text-xs text-amber-400"></i>
            <a href="egizi.html" class="hover:text-blue-600 transition-colors">Egizi</a>
        </div>
        <a href="egizi.html" class="text-xs bg-amber-200 hover:bg-amber-300 px-4 py-2 rounded-xl transition-colors flex items-center">
            <i class="fas fa-door-open mr-2"></i> Esci
        </a>
    </nav>

    <div id="quiz-container" class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-6 md:p-10 quiz-card border border-amber-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-amber-800 mb-2">🇪🇬 Quiz Antico Egitto</h1>
            <p class="text-amber-600 font-medium">Pagine 48-54 • Forza Nicole!</p>
            <div class="w-full bg-amber-100 h-3 rounded-full mt-6 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-amber-400 to-amber-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="question-counter" class="text-sm text-amber-500 mt-3 font-bold uppercase tracking-wider">Domanda 1 di 10</p>
        </div>

        <div id="question-section">
            <h2 id="question-text" class="text-xl font-semibold text-gray-800 mb-6 leading-tight">Caricamento domanda...</h2>
            <div id="options-container" class="space-y-4">
                </div>
        </div>

        <div id="feedback" class="hidden mt-8 p-6 rounded-2xl border-2 shadow-inner">
            <p id="feedback-title" class="font-bold text-xl mb-2"></p>
            <p id="feedback-text" class="text-gray-700 leading-relaxed"></p>
            <button id="next-btn" class="mt-6 w-full bg-amber-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-amber-700 transition-all transform active:scale-95">
                Prossima Domanda <i class="fas fa-arrow-right ml-2"></i>
            </button>
        </div>

        <div id="results-section" class="hidden text-center py-4">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-4xl font-bold text-amber-800 mb-4">Ottimo lavoro!</h2>
            <p class="text-xl text-gray-700 mb-6">Hai totalizzato <span id="final-score" class="font-extrabold text-amber-600 text-3xl">0</span> su 10!</p>
            <div id="result-message" class="mb-8 p-6 bg-amber-50 rounded-2xl border border-amber-200 text-amber-900 leading-relaxed"></div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="location.reload()" class="bg-amber-800 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-amber-900 transition flex items-center justify-center">
                    <i class="fas fa-redo mr-2"></i> Riprova
                </button>
                <a href="egizi.html" class="bg-slate-200 text-slate-700 py-4 rounded-xl font-bold shadow-lg hover:bg-slate-300 transition flex items-center justify-center font-sans">
                    <i class="fas fa-reply mr-2"></i> Torna a Egizi
                </a>
            </div>
        </div>
    </div>

    <footer class="mt-12 text-amber-900/40 text-xs font-bold uppercase tracking-widest pb-8">
        Hub Didattico Famiglia Messana
    </footer>

    <script>
        const quizData = [
            {
                question: "Quale divinità egizia ha la testa di sciacallo ed è il dio dell'Aldilà e della mummificazione?",
                options: ["Anubi", "Thot", "Sobek", "Bastet"],
                correct: 0,
                rationale: "Il testo specifica che Anubi aveva il corpo umano e la testa di sciacallo, occupandosi del passaggio dei defunti."
            },
            {
                question: "A cosa serviva lo 'shaduf', una delle invenzioni tecnologiche degli Egizi?",
                options: ["A misurare l'altezza del fiume", "Ad attingere acqua dal fiume per irrigare i campi", "A contare i giorni dell'anno", "A pesare il cuore dei defunti"],
                correct: 1,
                rationale: "Lo shaduf era un palo con un secchio e un peso che permetteva di sollevare l'acqua dal Nilo facilmente."
            },
            {
                question: "Dove venivano conservati gli organi interni dei defunti durante la mummificazione?",
                options: ["Nelle piramidi", "Nelle mastabe", "Nei vasi canopi", "Sotto le bende di lino"],
                correct: 2,
                rationale: "Il testo spiega che gli organi prelevati (tranne il cuore) venivano conservati in questi vasi speciali."
            },
            {
                question: "Come si chiama la scrittura più semplice e veloce usata dagli Egizi per la vita quotidiana?",
                options: ["Geroglifica", "Demotica", "Greco antico", "Ideografica"],
                correct: 1,
                rationale: "La scrittura demotica era fatta di segni più facili e veloci da tracciare rispetto ai geroglifici."
            },
            {
                question: "In un dipinto egizio, se la testa di una persona è di profilo, come sono solitamente raffigurati l'occhio e il busto?",
                options: ["Sempre di profilo", "Sempre di spalle", "Di fronte", "Solo il busto è frontale"],
                correct: 2,
                rationale: "Secondo le regole dell'arte egizia, l'occhio e il busto venivano raffigurati frontali anche se la testa era di lato."
            },
            {
                question: "Quale materiale usavano gli Egizi per realizzare i loro abiti leggeri?",
                options: ["Cotone", "Lana", "Lino", "Seta"],
                correct: 2,
                rationale: "Il lino era la fibra vegetale più comune, perfetta per creare tuniche e gonnellini freschi."
            },
            {
                question: "Durante la 'pesatura del cuore', il cuore del defunto doveva pesare:",
                options: ["Più della piuma", "Esattamente un cubito", "Quanto o meno di una piuma", "Quanto un vasetto canopo"],
                correct: 2,
                rationale: "Solo un cuore leggero come una piuma (senza peccati) permetteva l'accesso all'Aldilà."
            },
            {
                question: "Qual era l'unità di misura di lunghezza usata dagli Egizi, pari a circa 52 centimetri?",
                options: ["Il metro", "Il cubito (o gomito)", "Il nilometro", "Il passo"],
                correct: 1,
                rationale: "Il cubito corrispondeva alla lunghezza dal gomito alla punta delle dita, circa 52 cm."
            },
            {
                question: "Quale tra questi giochi da tavolo era simile alla nostra dama e si diffuse nel Nuovo Regno?",
                options: ["Mehen", "Scacchi", "Senet", "Danza degli specchi"],
                correct: 2,
                rationale: "Il senet era un gioco molto amato e diffuso, con regole che ricordano la dama."
            },
            {
                question: "Perché lo scarabeo era un simbolo sacro molto importante per gli Egizi?",
                options: ["Rappresentava la pioggia", "Era il simbolo del Sole del mattino", "Proteggeva i gatti", "Misurava il tempo"],
                correct: 1,
                rationale: "Gli Egizi vedevano nello scarabeo la forza che fa rinascere il Sole ogni mattina."
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackSection = document.getElementById('feedback');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const nextBtn = document.getElementById('next-btn');
        const progressIndicator = document.getElementById('progress-bar');
        const counterText = document.getElementById('question-counter');

        function loadQuestion() {
            const q = quizData[currentQuestion];
            questionText.textContent = q.question;
            optionsContainer.innerHTML = '';
            feedbackSection.classList.add('hidden');
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-amber-100 bg-white text-gray-700 font-bold shadow-sm hover:border-amber-400 focus:outline-none";
                btn.textContent = opt;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            const progress = ((currentQuestion + 1) / quizData.length) * 100;
            progressIndicator.style.width = `${progress}%`;
            counterText.textContent = `Domanda ${currentQuestion + 1} di ${quizData.length}`;
        }

        function selectOption(index) {
            const q = quizData[currentQuestion];
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);
            feedbackSection.classList.remove('hidden');
            
            if (index === q.correct) {
                score++;
                buttons[index].classList.replace('border-amber-100', 'border-green-500');
                buttons[index].classList.add('bg-green-50', 'text-green-800');
                feedbackTitle.textContent = "✅ Corretto!";
                feedbackTitle.className = "font-bold text-2xl mb-1 text-green-600";
                feedbackSection.classList.add('border-green-200', 'bg-green-50');
            } else {
                buttons[index].classList.replace('border-amber-100', 'border-red-500');
                buttons[index].classList.add('bg-red-50', 'text-red-800');
                buttons[q.correct].classList.replace('border-amber-100', 'border-green-500');
                feedbackTitle.textContent = "❌ Quasi...";
                feedbackTitle.className = "font-bold text-2xl mb-1 text-red-600";
                feedbackSection.classList.add('border-red-200', 'bg-red-50');
            }
            feedbackText.textContent = q.rationale;
        }

        nextBtn.onclick = () => {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                feedbackSection.classList.remove('border-green-200', 'bg-green-50', 'border-red-200', 'bg-red-50');
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            document.getElementById('question-section').classList.add('hidden');
            feedbackSection.classList.add('hidden');
            document.getElementById('results-section').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;

            let msg = "";
            if (score === 10) msg = "Incredibile Nicole! Sei una vera Regina del Nilo, conosci tutto sugli Antichi Egizi!";
            else if (score >= 7) msg = "Bravissima Nicole! Hai imparato quasi tutto, continua così!";
            else msg = "Buon lavoro! Rileggi le pagine e riprova, diventerai un'esperta in un lampo!";
            document.getElementById('result-message').textContent = msg;
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
