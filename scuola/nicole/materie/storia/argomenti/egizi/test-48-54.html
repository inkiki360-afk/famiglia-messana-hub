<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Quiz Egizi per Nicole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #fef3c7;
            background-image: url("https://www.transparenttextures.com/patterns/sandpaper.png");
        }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .gold-border { border: 4px solid #d4af37; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app-container" class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-6 md:p-10 gold-border relative overflow-hidden">
        
        <!-- Schermata Iniziale -->
        <div id="start-screen" class="text-center">
            <div class="text-6xl mb-4">🏺</div>
            <h1 class="text-4xl font-bold text-amber-900 mb-4">Sfida Egizia per Nicole</h1>
            <p class="text-amber-700 mb-8">Sei pronta a dimostrare di essere una vera esperta? Ora ci sono ben 20 domande tra immagini, quiz e misteri da scrivere!</p>
            <button onclick="startQuiz()" class="bg-amber-600 text-white px-10 py-4 rounded-2xl font-bold text-xl shadow-lg hover:bg-amber-700 transition-all hover:scale-105">
                Inizia l'Avventura!
            </button>
        </div>

        <!-- Quiz Interface -->
        <div id="quiz-interface" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="question-type-badge" class="bg-amber-100 text-amber-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">Scelta Multipla</span>
                <span id="score-display" class="font-bold text-amber-600">Punti: 0</span>
            </div>

            <div class="w-full bg-amber-100 h-3 rounded-full mb-8">
                <div id="progress-bar" class="bg-amber-50 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>

            <div id="question-content" class="fade-in">
                <h2 id="question-text" class="text-2xl font-bold text-gray-800 mb-6 leading-tight"></h2>
                
                <!-- Area Immagine (opzionale) -->
                <div id="image-container" class="hidden flex justify-center mb-6 bg-amber-50 p-4 rounded-2xl">
                    <span id="question-emoji" class="text-7xl"></span>
                </div>

                <!-- Opzioni (per scelta multipla) -->
                <div id="options-container" class="grid grid-cols-1 gap-3"></div>

                <!-- Input (per domande da scrivere) -->
                <div id="input-container" class="hidden">
                    <input type="text" id="answer-input" placeholder="Scrivi qui la risposta..." 
                           class="w-full p-4 border-3 border-amber-200 rounded-2xl focus:border-amber-500 focus:outline-none text-lg">
                    <button id="submit-input-btn" onclick="checkInputAnswer()" class="mt-4 w-full bg-amber-800 text-white py-4 rounded-2xl font-bold shadow-lg">
                        Invia Risposta
                    </button>
                </div>
            </div>

            <!-- Feedback -->
            <div id="feedback" class="hidden mt-8 p-6 rounded-2xl border-2 fade-in">
                <p id="feedback-title" class="font-bold text-xl mb-2"></p>
                <p id="feedback-text" class="text-gray-700 italic mb-4"></p>
                <button id="next-btn" class="w-full bg-amber-600 text-white py-3 rounded-xl font-bold hover:bg-amber-700">
                    Avanti →
                </button>
            </div>
        </div>

        <!-- Schermata Finale -->
        <div id="final-screen" class="hidden text-center">
            <h2 class="text-4xl font-bold text-amber-900 mb-4">Missione Compiuta!</h2>
            <div id="final-emoji" class="text-7xl mb-4">🏆</div>
            <p class="text-xl mb-6">Hai totalizzato <span id="final-score" class="font-bold text-amber-600">0</span> su <span id="total-questions-display"></span> punti!</p>
            <div id="final-msg" class="p-6 bg-amber-50 rounded-2xl mb-8 border border-amber-200"></div>
            <button onclick="location.reload()" class="bg-amber-800 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-amber-900">
                Gioca Ancora
            </button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                type: "choice",
                question: "Di quale animale aveva la testa il dio Thot?",
                options: ["Falco", "Sciacallo", "Uccello Ibis", "Coccodrillo"],
                correct: 2,
                rationale: "Thot era il dio della scrittura e aveva la testa di uccello ibis."
            },
            {
                type: "visual",
                emoji: "🐊",
                question: "Osserva questo animale sacro. Quale dio rappresentava e di cosa si occupava?",
                options: ["Anubi - Aldilà", "Sobek - Piene del Nilo", "Bastet - Raccolti", "Hathor - Amore"],
                correct: 1,
                rationale: "Il coccodrillo era il simbolo di Sobek, dio delle acque e delle piene del Nilo."
            },
            {
                type: "input",
                question: "Come si chiamava lo strumento graduato usato per misurare l'altezza delle piene del fiume?",
                answer: "nilometro",
                rationale: "Il nilometro era una colonna graduata posta in un pozzo per controllare il livello del Nilo."
            },
            {
                type: "choice",
                question: "Cosa succedeva se, durante la pesatura, il cuore pesava più della piuma?",
                options: ["Si andava nel Regno dei morti", "Il defunto non poteva accedere all'Aldilà", "Si diventava faraoni", "Si riceveva un premio"],
                correct: 1,
                rationale: "Se il cuore era pesante (carico di colpe), il defunto non poteva entrare nel Regno dei morti."
            },
            {
                type: "input",
                question: "Qual era la pianta usata dagli scribi esperti per creare fogli su cui scrivere?",
                answer: "papiro",
                rationale: "Gli scribi imparavano sulla terracotta, ma da esperti usavano i pregiati fogli di papiro."
            },
            {
                type: "visual",
                emoji: "👁️🎨",
                question: "Secondo le regole dell'arte egizia, come doveva essere disegnato l'occhio in un volto di profilo?",
                options: ["Chiuso", "Di profilo", "Frontale", "Non veniva disegnato"],
                correct: 2,
                rationale: "L'arte egizia prevedeva che, anche se il volto era di profilo, l'occhio fosse visto frontalmente."
            },
            {
                type: "choice",
                question: "In quali vasi venivano conservati gli organi estratti durante la mummificazione?",
                options: ["Vasi di terracotta", "Vasi canopi", "Vasi di lino", "Sarcofaghi"],
                correct: 1,
                rationale: "I vasi canopi servivano a custodire gli organi interni, tranne il cuore."
            },
            {
                type: "input",
                question: "Quanti giorni durava l'anno nel calendario inventato dagli Egizi?",
                answer: "365",
                rationale: "Grazie all'astronomia, gli Egizi calcolarono un anno di 365 giorni diviso in 12 mesi."
            },
            {
                type: "choice",
                question: "Chi era l'unica donna a poter partecipare ai riti religiosi insieme al Faraone?",
                options: ["La Scriba", "La Dea Bastet", "La Regina", "La Sacerdotessa"],
                correct: 2,
                rationale: "Solo il faraone e la regina potevano partecipare ai riti celebrati nei templi."
            },
            {
                type: "visual",
                emoji: "🧶✨",
                question: "Con quale tessuto leggero erano realizzati gli abiti degli Antichi Egizi?",
                options: ["Seta", "Lana", "Lino", "Pelle"],
                correct: 2,
                rationale: "Gli abiti erano fatti di lino per proteggersi dal calore del Sole."
            },
            // NUOVE DOMANDE AGGIUNTE
            {
                type: "choice",
                question: "Cosa significa letteralmente il termine 'geroglifico'?",
                options: ["Disegno degli dèi", "Segno sacro inciso", "Scrittura segreta", "Pietra parlante"],
                correct: 1,
                rationale: "Il termine deriva dal fatto che i primi segni furono ritrovati incisi sulle pareti di tombe e templi."
            },
            {
                type: "input",
                question: "In quale anno fu ritrovata a Rosetta la famosa stele che permise di decifrare la scrittura?",
                answer: "1799",
                rationale: "La Stele di Rosetta fu trovata nel 1799 e conteneva lo stesso testo in greco, demotico e geroglifico."
            },
            {
                type: "visual",
                emoji: "🐄☀️",
                question: "Quale dea aveva un copricapo con le corna da mucca e il Sole?",
                options: ["Iside", "Bastet", "Hathor", "Maat"],
                correct: 2,
                rationale: "Hathor era la dea del cielo e dell'amore, rappresentata con le corna di mucca."
            },
            {
                type: "choice",
                question: "Quale di queste affermazioni sui diritti delle donne egizie è CORRETTA?",
                options: ["Non potevano uscire di casa", "Potevano usare i propri beni e scegliere il marito", "Non potevano lavorare", "Non potevano possedere nulla"],
                correct: 1,
                rationale: "Le donne egizie godevano di molta libertà rispetto ad altre società antiche: lavoravano e gestivano beni."
            },
            {
                type: "input",
                question: "Su quale numero si basava il sistema di calcolo sviluppato dagli Egizi?",
                answer: "10",
                rationale: "Gli Egizi avevano sviluppato un sistema di calcolo basato sulla decina (il numero 10)."
            },
            {
                type: "choice",
                question: "Sugli orologi solari, come veniva indicata l'ora?",
                options: ["Dall'altezza dell'acqua", "Dalla posizione delle stelle", "Dall'ombra proiettata da un'asta", "Dal suono di un campanello"],
                correct: 2,
                rationale: "L'ombra si spostava sul terreno indicando il passare delle 12 ore diurne."
            },
            {
                type: "visual",
                emoji: "💺✨",
                question: "Iside era la dea della natura e moglie di Osiride. Quale simbolo aveva sulla testa?",
                options: ["Un Sole", "Un trono", "Un fiore di loto", "Una stella"],
                correct: 1,
                rationale: "Iside è facilmente riconoscibile perché porta sulla testa il simbolo del trono."
            },
            {
                type: "input",
                question: "Il gatto era considerato l'anello di congiunzione tra la Terra e quale altro luogo?",
                answer: "cielo",
                rationale: "Per gli Egizi il gatto era un animale sacro che univa il mondo terreno (Terra) a quello divino (Cielo)."
            },
            {
                type: "choice",
                question: "In quante ore diurne e quante ore notturne gli Egizi suddividevano il giorno?",
                options: ["10 diurne e 10 notturne", "12 diurne e 12 notturne", "24 ore tutte uguali", "8 diurne e 16 notturne"],
                correct: 1,
                rationale: "Il giorno era diviso esattamente in 12 ore di luce e 12 ore di buio."
            },
            {
                type: "visual",
                emoji: "🪞💃",
                question: "A quale dea era dedicata la famosa 'danza degli specchi' eseguita durante i riti?",
                options: ["Iside", "Hathor", "Bastet", "Sekhmet"],
                correct: 1,
                rationale: "La danza degli specchi era un rito musicale dedicato a Hathor, dea dell'amore e del cielo."
            }
        ];

        let currentQ = 0;
        let score = 0;

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-interface').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = quizData[currentQ];
            const typeBadge = document.getElementById('question-type-badge');
            const questionText = document.getElementById('question-text');
            const optionsBox = document.getElementById('options-container');
            const inputBox = document.getElementById('input-container');
            const imageBox = document.getElementById('image-container');
            const feedback = document.getElementById('feedback');
            
            feedback.classList.add('hidden');
            inputBox.classList.add('hidden');
            imageBox.classList.add('hidden');
            optionsBox.innerHTML = '';
            
            document.getElementById('answer-input').value = '';
            document.getElementById('progress-bar').style.width = `${(currentQ / quizData.length) * 100}%`;
            document.getElementById('score-display').textContent = `Punti: ${score}`;

            questionText.textContent = q.question;

            if (q.type === "choice" || q.type === "visual") {
                typeBadge.textContent = q.type === "visual" ? "Sfida Visiva" : "Scelta Multipla";
                if (q.type === "visual") {
                    imageBox.classList.remove('hidden');
                    document.getElementById('question-emoji').textContent = q.emoji;
                }
                q.options.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = "p-4 text-left border-2 border-amber-100 rounded-xl hover:bg-amber-50 hover:border-amber-400 transition font-medium text-gray-700";
                    btn.textContent = opt;
                    btn.onclick = () => checkChoice(i);
                    optionsBox.appendChild(btn);
                });
            } else if (q.type === "input") {
                typeBadge.textContent = "Scrivi la risposta";
                inputBox.classList.remove('hidden');
                document.getElementById('submit-input-btn').disabled = false;
            }
        }

        function checkChoice(idx) {
            const q = quizData[currentQ];
            const isCorrect = idx === q.correct;
            handleResult(isCorrect);
        }

        function checkInputAnswer() {
            const q = quizData[currentQ];
            const userAns = document.getElementById('answer-input').value.toLowerCase().trim();
            const isCorrect = userAns === q.answer.toLowerCase();
            handleResult(isCorrect);
        }

        function handleResult(isCorrect) {
            const q = quizData[currentQ];
            const fb = document.getElementById('feedback');
            const fbt = document.getElementById('feedback-title');
            const fbtx = document.getElementById('feedback-text');
            
            if (isCorrect) score++;
            
            fb.classList.remove('hidden');
            fb.className = `mt-8 p-6 rounded-2xl border-2 ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`;
            fbt.textContent = isCorrect ? "🎉 Grandiosa!" : "🧐 Oh no, Nicole!";
            fbt.className = `font-bold text-xl mb-2 ${isCorrect ? 'text-green-700' : 'text-red-700'}`;
            fbtx.textContent = q.rationale;
            
            // Disabilita altri input
            document.querySelectorAll('#options-container button').forEach(b => b.disabled = true);
            document.getElementById('submit-input-btn').disabled = true;
        }

        document.getElementById('next-btn').onclick = () => {
            currentQ++;
            if (currentQ < quizData.length) {
                showQuestion();
            } else {
                showFinal();
            }
        };

        function showFinal() {
            document.getElementById('quiz-interface').classList.add('hidden');
            document.getElementById('final-screen').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
            document.getElementById('total-questions-display').textContent = quizData.length;
            
            let msg = "";
            let emoji = "🏺";
            if (score === quizData.length) { msg = "Incredibile! Sei diventata la Gran Sacerdotessa d'Egitto! Conosci ogni singolo segreto delle pagine studiate."; emoji = "👑"; }
            else if (score >= 15) { msg = "Bravissima Nicole! Hai una memoria da scriba reale, continua così!"; emoji = "📜"; }
            else if (score >= 10) { msg = "Buon lavoro! Hai una buona base, ma rileggi i dettagli sulle divinità e sulla scrittura."; emoji = "🏜️"; }
            else { msg = "Gli dèi ti consigliano di rileggere le pagine con attenzione per superare la prossima sfida!"; emoji = "🐫"; }
            
            document.getElementById('final-msg').textContent = msg;
            document.getElementById('final-emoji').textContent = emoji;
        }
    </script>
</body>
</html>
