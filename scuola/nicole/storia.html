<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storia - Spazio Nicole - Famiglia Messana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 min-h-screen">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white bg-opacity-60 backdrop-blur-md shadow-sm">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0">
                    <a href="../../index.html" class="text-xl font-bold text-slate-800 tracking-tight">
                        Famiglia <span class="text-blue-600">Messana</span>
                    </a>
                </div>
                <div class="hidden md:flex space-x-8">
                    <a href="../../index.html" class="text-slate-600 hover:text-blue-600 font-medium transition-colors">Home</a>
                    <a href="../index.html" class="text-slate-600 hover:text-blue-600 font-medium transition-colors">Scuola</a>
                    <a href="../../viaggi/index.html" class="text-slate-600 hover:text-blue-600 font-medium transition-colors">Viaggi</a>
                    <a href="../../progetti-ia/index.html" class="text-slate-600 hover:text-blue-600 font-medium transition-colors">Progetti IA</a>
                    <a href="../../svago/index.html" class="text-slate-600 hover:text-blue-600 font-medium transition-colors">Svago</a>
                </div>
                <div class="md:hidden">
                    <button id="nav-toggle" class="text-slate-700 p-2 focus:outline-none" aria-label="Apri menu">
                        <i class="fas fa-bars fa-lg"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="nav-menu" class="md:hidden hidden bg-white border-t border-slate-100 px-4 py-4 space-y-3">
            <a href="../../index.html" class="block text-slate-700 hover:text-blue-600 font-medium">Home</a>
            <a href="../index.html" class="block text-slate-700 hover:text-blue-600 font-medium">Scuola</a>
            <a href="../../viaggi/index.html" class="block text-slate-700 hover:text-blue-600 font-medium">Viaggi</a>
            <a href="../../progetti-ia/index.html" class="block text-slate-700 hover:text-blue-600 font-medium">Progetti IA</a>
            <a href="../../svago/index.html" class="block text-slate-700 hover:text-blue-600 font-medium">Svago</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <nav class="mb-8 flex items-center space-x-4">
            <a href="../nicole.html" class="text-blue-600 hover:text-blue-800 font-semibold flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> Torna a Spazio Nicole
            </a>
            <span class="text-slate-400">|</span>
            <a href="../../index.html" class="text-blue-600 hover:text-blue-800 font-semibold flex items-center">
                <i class="fas fa-home mr-2"></i> Home
            </a>
        </nav>
        
        <article class="bg-white rounded-2xl shadow-lg p-8">
            <header class="flex items-center mb-6">
                <i class="fas fa-scroll text-purple-600 text-4xl mr-4"></i>
                <h1 class="text-4xl font-bold text-slate-900">Storia</h1>
            </header>
            <p class="text-slate-700 text-lg leading-relaxed">
                Qui troverai appunti, esercizi e materiali didattici di Storia.
            </p>
        </article>

        <!-- Argomenti -->
        <section class="mt-8 grid grid-cols-1 sm:grid-cols-2 gap-4">
            <article>
                <a href="storia/egizi.html" class="group block h-full">
                    <div class="bg-white rounded-lg shadow-md hover:shadow-lg transition-all duration-300 p-6 border border-slate-100 h-full flex flex-col">
                        <div class="flex items-center mb-3">
                            <i class="fas fa-gopuram text-amber-600 text-2xl mr-3"></i>
                            <h3 class="text-lg font-semibold text-slate-800 group-hover:text-amber-600 transition-colors">Egizi</h3>
                        </div>
                        <p class="text-slate-600 text-sm flex-grow">Appunti e materiali sulla civiltà egizia.</p>
                    </div>
                </a>
            </article>
        </section>

        <section class="mt-12 p-6 bg-blue-50 rounded-lg border border-blue-200">
            <h2 class="text-lg font-semibold text-slate-800 mb-3">Vedi anche</h2>
            <div class="flex flex-wrap gap-3">
                <a href="../noah/storia.html" class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fas fa-scroll mr-2"></i> Storia di Noah
                </a>
            </div>
        </section>
    </main>

    <script>
        const navToggle = document.getElementById('nav-toggle');
        const navMenu = document.getElementById('nav-menu');
        if (navToggle && navMenu) {
            navToggle.addEventListener('click', () => {
                const isHidden = navMenu.classList.contains('hidden');
                navMenu.classList.toggle('hidden');
                navToggle.setAttribute('aria-expanded', !isHidden);
            });
            navMenu.querySelectorAll('a').forEach(a => {
                a.addEventListener('click', () => {
                    navMenu.classList.add('hidden');
                    navToggle.setAttribute('aria-expanded', false);
                });
            });
        }
    </script>
</body>
</html>
