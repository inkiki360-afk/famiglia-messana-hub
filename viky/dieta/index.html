<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Dieta - Obiettivo 80kg - Spazio Viky</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { margin: 0; padding: 0; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURAZIONE: inserisci qui la tua Firebase config (da Firebase Console) ---
        const FIREBASE_CONFIG_STRING = '{"apiKey":"","authDomain":"","projectId":"","storageBucket":"","messagingSenderId":"","appId":""}';
        const APP_ID = 'dieta-80kg-v2';
        const GEMINI_API_KEY = ''; // Opzionale: per analisi AI cibo

        let firebaseApp = null;
        let firebaseAuth = null;
        let firebaseDb = null;
        try {
            const config = JSON.parse(FIREBASE_CONFIG_STRING);
            if (config && config.apiKey) {
                firebaseApp = firebase.initializeApp(config);
                firebaseAuth = firebase.auth();
                firebaseDb = firebase.firestore();
            }
        } catch (e) { console.warn('Firebase non configurato. Usa la app in modalità demo.'); }

        const PIANO_SETTIMANALE = {
            'Lunedì': { sport: 'Padel (1h30)', colazione: { text: '250ml Latte parz. screm., caffè, 2 fette biscottate, 30g marmellata fragole, 100g uva', kcal: 350, ing: ['Latte parz. screm.', 'Fette biscottate', 'Marmellata fragole', 'Uva'] }, spuntino: { text: '25g Frutta secca', kcal: 160, ing: ['Mix Frutta secca'] }, pranzo: { text: '80g Riso integrale, 120g Legumi, 200g Verdure', kcal: 650, ing: ['Riso integrale', 'Legumi (ceci/lenticchie)', 'Zucchine/Carote'] }, cena: { text: '3 Uova, 250g Verdure', kcal: 550, ing: ['Uova', 'Spinaci/Broccoli'] } },
            'Martedì': { sport: 'Riposo', colazione: { text: '250ml Latte, caffè, 2 fette biscottate, 30g marmellata, 150g frutta', kcal: 380, ing: ['Latte', 'Fette biscottate', 'Marmellata', 'Frutta fresca'] }, spuntino: { text: '25g Frutta secca', kcal: 160, ing: ['Mix Frutta secca'] }, pranzo: { text: '80g Riso o Farro, 112g Tonno al naturale, 200g Verdure', kcal: 620, ing: ['Riso o Farro', 'Tonno al naturale', 'Finocchi/Pomodori'] }, cena: { text: '180g Petto di pollo, 250g Verdure', kcal: 500, ing: ['Petto di pollo', 'Zucchine'] } },
            'Mercoledì': { sport: 'Palestra (PT)', colazione: { text: '250ml Latte, caffè, 2 fette biscottate, 30g marmellata', kcal: 320, ing: ['Latte', 'Fette biscottate', 'Marmellata'] }, spuntino: { text: 'Yogurt Greco 150g', kcal: 150, ing: ['Yogurt Greco'] }, pranzo: { text: '80g Riso, 120g Legumi, 200g Verdure', kcal: 650, ing: ['Riso', 'Legumi', 'Verdure miste'] }, cena: { text: '70g Pasta, sugo pomodoro, 30g parmigiano, verdure', kcal: 650, ing: ['Pasta integrale', 'Passata pomodoro', 'Parmigiano', 'Broccoli'] } },
            'Giovedì': { sport: 'Padel (Maestro)', colazione: { text: '250ml Latte, caffè, 2 fette biscottate, 30g marmellata, frutta', kcal: 380, ing: ['Latte', 'Fette biscottate', 'Marmellata', 'Frutta fresca'] }, spuntino: { text: '25g Frutta secca', kcal: 160, ing: ['Mix Frutta secca'] }, pranzo: { text: '80g Riso, 120g Tonno o Legumi, 200g Verdure', kcal: 650, ing: ['Riso', 'Tonno o Legumi', 'Insalata'] }, cena: { text: 'Insalatona con 150g Pollo o Tonno, verdure, 40g Pane', kcal: 550, ing: ['Pollo o Tonno', 'Insalata mista', 'Pane integrale'] } },
            'Venerdì': { sport: 'Riposo', colazione: { text: '250ml Latte, caffè, 2 fette biscottate, marmellata', kcal: 320, ing: ['Latte', 'Fette biscottate', 'Marmellata'] }, spuntino: { text: '25g Frutta secca', kcal: 160, ing: ['Mix Frutta secca'] }, pranzo: { text: '80g Riso o Farro, 150g Pollo o Legumi, 200g Verdure', kcal: 700, ing: ['Riso o Farro', 'Pollo o Legumi', 'Zucchine'] }, cena: { text: '180g Pesce, 250g Verdure, 40g Pane', kcal: 550, ing: ['Pesce bianco', 'Finocchi', 'Pane integrale'] } },
            'Sabato': { sport: 'Attività libera', colazione: { text: 'Latte, caffè, fette biscottate, marmellata', kcal: 320, ing: ['Latte', 'Fette biscottate', 'Marmellata'] }, spuntino: { text: 'Frutta', kcal: 100, ing: ['Frutta fresca'] }, pranzo: { text: 'Insalatona con proteine', kcal: 500, ing: ['Tonno/Pollo', 'Insalata', 'Pomodori'] }, cena: { text: 'PIZZA (Margherita, Marinara o Verdure)', kcal: 850, ing: ['Pizza (Ristorante/Asporto)'] } },
            'Domenica': { sport: 'Passeggiata', colazione: { text: 'Normale', kcal: 400, ing: ['Latte', 'Fette biscottate'] }, spuntino: { text: 'Frutta', kcal: 100, ing: ['Frutta fresca'] }, pranzo: { text: 'Pranzo in famiglia', kcal: 900, ing: ['Pasta', 'Carne magra', 'Olio EVO'] }, cena: { text: 'Proteine leggere + Verdure', kcal: 400, ing: ['Pesce o Bresaola', 'Verdure al vapore'] } }
        };

        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        const Icon = ({ name, size = 18, className = '' }) => {
            const map = { Home: 'fa-home', Calendar: 'fa-calendar', ShoppingCart: 'fa-shopping-cart', Scale: 'fa-weight-scale', Plus: 'fa-plus', Utensils: 'fa-utensils', ChevronRight: 'fa-chevron-right', Trash2: 'fa-trash', CheckCircle2: 'fa-circle-check', Activity: 'fa-chart-line', Zap: 'fa-bolt', Clock: 'fa-clock', Search: 'fa-search', Check: 'fa-check', Send: 'fa-paper-plane', Flame: 'fa-fire', Circle: 'fa-circle', PlusCircle: 'fa-circle-plus', Loader2: 'fa-spinner', AlertCircle: 'fa-circle-exclamation', History: 'fa-clock-rotate-left', ScanBarcode: 'fa-barcode', Type: 'fa-font', Sunrise: 'fa-sun', ShoppingBag: 'fa-bag-shopping', ClipboardList: 'fa-clipboard-list', TrendingDown: 'fa-chart-line', HeartPulse: 'fa-heart-pulse' };
            const fa = map[name] || 'fa-circle';
            const spin = name === 'Loader2';
            return <i className={'fas ' + fa + (spin ? ' fa-spin' : '') + ' ' + className} style={{ fontSize: size }} aria-hidden />;
        };

        const MealCardWithCheck = ({ title, data, completed, onToggle }) => (
            <div onClick={onToggle} className={'p-4 rounded-[32px] border flex items-start gap-4 transition-all cursor-pointer active:scale-[0.98] ' + (completed ? 'bg-blue-50 border-blue-200 ring-1 ring-blue-100 shadow-sm' : 'bg-white border-slate-100 shadow-sm')}>
                <div className={'mt-1 w-10 h-10 rounded-2xl flex items-center justify-center shrink-0 transition-all ' + (completed ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-300')}><Icon name="Check" size={20} /></div>
                <div className="flex-1">
                    <div className="flex justify-between items-center mb-1"><h4 className={'font-bold text-sm ' + (completed ? 'text-blue-700' : 'text-slate-800')}>{title}</h4><span className={'text-[9px] font-black px-2 py-0.5 rounded-full ' + (completed ? 'bg-blue-200 text-blue-700' : 'bg-slate-100 text-slate-500')}>{data?.kcal || 0} KCAL</span></div>
                    <p className={(completed ? 'text-blue-600/60' : 'text-slate-500') + ' text-[10px] leading-snug'}>{data?.text || ''}</p>
                </div>
            </div>
        );

        const NavButton = ({ active, icon, label, onClick }) => (
            <button onClick={onClick} className={'flex flex-col items-center gap-1 transition-colors ' + (active ? 'text-blue-600' : 'text-slate-400')}><div className="mb-0.5">{icon}</div><span className="text-[8px] font-black uppercase tracking-tighter">{label}</span></button>
        );

        const WeightTrendChart = ({ data }) => {
            const chartData = [...data].sort((a, b) => a.timestamp - b.timestamp);
            const padding = 20, width = 300, height = 150;
            const minWeight = Math.min(...chartData.map(d => d.value)) - 1;
            const maxWeight = Math.max(...chartData.map(d => d.value)) + 1;
            const weightRange = maxWeight - minWeight;
            const getX = (index) => padding + (index * (width - padding * 2)) / (chartData.length - 1);
            const getY = (value) => height - padding - ((value - minWeight) * (height - padding * 2)) / weightRange;
            const points = chartData.map((d, i) => getX(i) + ',' + getY(d.value)).join(' ');
            return (
                <svg viewBox={'0 0 ' + width + ' ' + height} className="w-full h-auto">
                    <line x1={padding} y1={getY(minWeight)} x2={width-padding} y2={getY(minWeight)} stroke="#e2e8f0" strokeWidth="1" strokeDasharray="4" />
                    <polyline fill="none" stroke="#2563eb" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" points={points} />
                    {chartData.map((d, i) => (
                        <g key={i}>
                            <circle cx={getX(i)} cy={getY(d.value)} r="4" fill="white" stroke="#2563eb" strokeWidth="2" />
                            {(i === 0 || i === chartData.length - 1) && <text x={getX(i)} y={getY(d.value) - 10} textAnchor="middle" fontSize="10" fontWeight="bold" fill="#1e40af">{d.value}</text>}
                            <text x={getX(i)} y={height - 2} textAnchor="middle" fontSize="8" fill="#94a3b8" fontWeight="bold">{d.date.split('/')[0]}/{d.date.split('/')[1]}</text>
                        </g>
                    ))}
                </svg>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [meals, setMeals] = useState([]);
            const [weights, setWeights] = useState([]);
            const [activities, setActivities] = useState([]);
            const [isLogging, setIsLogging] = useState(false);
            const [isLoggingActivity, setIsLoggingActivity] = useState(false);
            const [logType, setLogType] = useState('text');
            const [logInput, setLogInput] = useState('');
            const [barcodeInput, setBarcodeInput] = useState('');
            const [quantityInput, setQuantityInput] = useState('');
            const [activityInput, setActivityInput] = useState('');
            const [loadingCategory, setLoadingCategory] = useState(null);
            const [errorMessage, setErrorMessage] = useState(null);
            const [shoppingChecks, setShoppingChecks] = useState({});
            const [mealExtras, setMealExtras] = useState({ colazione: '', spuntino: '', pranzo: '', cena: '' });

            useEffect(() => {
                if (!firebaseAuth) return;
                firebaseAuth.signInAnonymously().catch(e => console.warn('Auth:', e));
                const unsub = firebaseAuth.onAuthStateChanged(setUser);
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user || !firebaseDb) return;
                const base = firebaseDb.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid);
                const unMeals = base.collection('meals').onSnapshot(snap => setMeals(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unWeights = base.collection('weights').onSnapshot(snap => setWeights(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => b.timestamp - a.timestamp)));
                const unAct = base.collection('activity').onSnapshot(snap => setActivities(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                return () => { unMeals(); unWeights(); unAct(); };
            }, [user]);

            const stats = useMemo(() => {
                const today = new Date().toLocaleDateString('it-IT');
                const consumed = meals.filter(m => m.date === today).reduce((acc, m) => acc + (m.calories || 0), 0);
                const todayActivity = activities.find(a => a.date === today)?.calories || 0;
                const burned = 2500 + todayActivity;
                return { consumed, target: 2000, burned, remaining: Math.max(2000 - consumed, 0) };
            }, [meals, activities]);

            const toggleMeal = async (type, mealData) => {
                if (!user || !firebaseDb) return;
                const today = new Date().toLocaleDateString('it-IT');
                const col = firebaseDb.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('meals');
                const existing = meals.find(m => m.date === today && m.predefinedId === type);
                if (existing) await col.doc(existing.id).delete();
                else await col.add({ food: type.charAt(0).toUpperCase() + type.slice(1) + ' (Piano)', calories: mealData.kcal, date: today, timestamp: Date.now(), predefinedId: type, type: 'predefined' });
            };

            const logActivity = async (val) => {
                if (!val || !user || !firebaseDb) return;
                const today = new Date().toLocaleDateString('it-IT');
                const col = firebaseDb.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('activity');
                const existing = activities.find(a => a.date === today);
                const data = { calories: parseInt(val), date: today, timestamp: Date.now() };
                if (existing) await col.doc(existing.id).set(data);
                else await col.add(data);
                setIsLoggingActivity(false);
                setActivityInput('');
            };

            const handleAI = async (text, category, quantity = '') => {
                if (!text || !user || !firebaseDb) return;
                setLoadingCategory(category);
                setErrorMessage(null);
                let attempts = 0;
                while (attempts < 5) {
                    try {
                        const prompt = category === 'barcode' ? 'Identifica prodotto codice: ' + text + ', quantità ' + (quantity || 100) + 'g. Rispondi JSON: {"food": "Nome", "calories": numero}.' : 'Cibo: "' + text + '". Quantità ' + (quantity || 'standard') + '. Per uomo 85kg. Rispondi JSON: {"food": "nome", "calories": numero}.';
                        if (!GEMINI_API_KEY) { setErrorMessage('Configura GEMINI_API_KEY per analisi AI.'); setLoadingCategory(null); return; }
                        const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + GEMINI_API_KEY, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                        const res = await resp.json();
                        const match = (res.candidates?.[0]?.content?.parts?.[0]?.text || '').match(/\{[\s\S]*\}/);
                        const data = match ? JSON.parse(match[0]) : { food: text, calories: 0 };
                        await firebaseDb.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('meals').add({ ...data, date: new Date().toLocaleDateString('it-IT'), timestamp: Date.now(), type: 'extra', category });
                        if (category === 'manual' || category === 'barcode') { setLogInput(''); setBarcodeInput(''); setQuantityInput(''); setIsLogging(false); } else setMealExtras(prev => ({ ...prev, [category]: '' }));
                        setLoadingCategory(null); return;
                    } catch (e) { attempts++; await delay(1000 * Math.pow(2, attempts)); }
                }
                setErrorMessage('Errore connessione.'); setLoadingCategory(null);
            };

            const addWeight = async (val) => {
                if (!val || !user || !firebaseDb) return;
                await firebaseDb.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('weights').add({ value: parseFloat(val), date: new Date().toLocaleDateString('it-IT'), timestamp: Date.now() });
            };

            const dynamicShoppingList = useMemo(() => {
                const list = [];
                for (let i = 0; i < 3; i++) {
                    const d = new Date(); d.setDate(d.getDate() + i);
                    const name = new Intl.DateTimeFormat('it-IT', { weekday: 'long' }).format(d);
                    const capName = name.charAt(0).toUpperCase() + name.slice(1);
                    const dayData = PIANO_SETTIMANALE[capName] || PIANO_SETTIMANALE['Lunedì'];
                    list.push(...dayData.colazione.ing, ...dayData.spuntino.ing, ...dayData.pranzo.ing, ...dayData.cena.ing);
                }
                return [...new Set(list)].sort();
            }, []);

            const dayName = new Intl.DateTimeFormat('it-IT', { weekday: 'long' }).format(new Date());
            const capDay = dayName.charAt(0).toUpperCase() + dayName.slice(1);
            const todayData = PIANO_SETTIMANALE[capDay] || PIANO_SETTIMANALE['Lunedì'];
            const todayStr = new Date().toLocaleDateString('it-IT');
            const todayMeals = meals.filter(m => m.date === todayStr).sort((a, b) => b.timestamp - a.timestamp);

            if (!firebaseApp) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
                        <div className="bg-white rounded-3xl border border-slate-200 p-8 max-w-md text-center shadow-lg">
                            <h1 className="text-xl font-bold text-slate-800 mb-2">App Dieta – Obiettivo 80kg</h1>
                            <p className="text-sm text-slate-600 mb-4">Per usare l’app con salvataggio dati, configura Firebase in <code className="bg-slate-100 px-2 py-0.5 rounded text-xs">viky/dieta/index.html</code>: apri il file e sostituisci <code className="bg-slate-100 px-2 py-0.5 rounded text-xs">FIREBASE_CONFIG_STRING</code> con la tua config (JSON) da Firebase Console.</p>
                            <a href="../index.html" className="inline-block text-blue-600 font-semibold text-sm">Torna a Spazio Viky</a>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-slate-50 text-slate-900 font-sans overflow-hidden">
                    <header className="bg-white border-b p-4 flex justify-between items-center shrink-0">
                        <div className="flex flex-col">
                            <a href="../index.html" className="text-[10px] font-bold text-slate-400 hover:text-blue-600 uppercase tracking-widest mb-1 inline-flex items-center gap-1"><i className="fas fa-arrow-left"/> Spazio Viky</a>
                            <h1 className="text-xl font-bold text-blue-600 mb-1 leading-none">Obiettivo 80kg</h1>
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{new Intl.DateTimeFormat('it-IT', { weekday: 'long', day: 'numeric', month: 'long' }).format(new Date())}</p>
                        </div>
                        <div className="flex flex-col items-end">
                            <div className="flex items-center gap-2 bg-blue-50 px-3 py-1.5 rounded-2xl border border-blue-100 shadow-sm">
                                <Icon name="Scale" size={16} className="text-blue-600" />
                                <span className="text-sm font-bold text-blue-800">{weights[0]?.value ?? 85.6} kg</span>
                            </div>
                            {weights[0]?.date && <div className="text-[9px] text-slate-400 font-bold mt-1 uppercase">Ultimo: {weights[0].date}</div>}
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-4 pb-28 space-y-6">
                        {view === 'home' && (
                            <div className="space-y-6">
                                <section className="grid grid-cols-3 gap-3">
                                    <div className="bg-indigo-600 rounded-3xl p-4 flex flex-col items-center justify-center text-center shadow-lg"><Icon name="Utensils" size={18} className="text-white/40 mb-1"/><p className="text-[9px] font-bold text-indigo-100 uppercase mb-1">Acquisite</p><p className="text-xl font-black text-white">{stats.consumed}</p></div>
                                    <div onClick={() => setIsLoggingActivity(true)} className="bg-orange-500 rounded-3xl p-4 flex flex-col items-center justify-center text-center shadow-lg cursor-pointer active:scale-95 transition-transform relative"><Icon name="Flame" size={18} className="text-white/40 mb-1"/><p className="text-[9px] font-bold text-orange-50 uppercase mb-1">Bruciate</p><p className="text-xl font-black text-white">{stats.burned}</p><div className="absolute top-1 right-2 flex items-center gap-1 bg-white/20 px-1.5 py-0.5 rounded-full text-[7px] font-black text-white uppercase"><Icon name="HeartPulse" size={8}/> Salute</div></div>
                                    <div className="bg-emerald-600 rounded-3xl p-4 flex flex-col items-center justify-center text-center shadow-lg"><Icon name="Zap" size={18} className="text-white/40 mb-1"/><p className="text-[9px] font-bold text-emerald-100 uppercase mb-1">Residue</p><p className="text-xl font-black text-white">{stats.remaining}</p></div>
                                </section>
                                {errorMessage && <p className="text-sm text-red-600 font-medium">{errorMessage}</p>}
                                {todayMeals.length > 0 && (
                                    <div className="bg-white rounded-3xl border border-indigo-100 p-4 shadow-sm">
                                        <h4 className="text-[10px] font-bold text-indigo-600 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="Activity" size={12}/> Riepilogo Odierno</h4>
                                        <div className="space-y-2 max-h-40 overflow-y-auto pr-1">
                                            {todayMeals.map(m => (
                                                <div key={m.id} className="flex justify-between items-center py-2 border-b border-slate-50 last:border-0">
                                                    <span className="text-xs font-semibold text-slate-700 truncate max-w-[180px]">{m.food}</span>
                                                    <div className="flex items-center gap-3"><span className="text-xs font-black text-indigo-600">+{m.calories}</span><button onClick={() => firebaseDb.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid).collection('meals').doc(m.id).delete()} className="text-slate-300"><Icon name="Trash2" size={12}/></button></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <section className="space-y-4">
                                    <h3 className="text-lg font-bold px-1">Piano Odierno</h3>
                                    {['colazione', 'spuntino', 'pranzo', 'cena'].map((type) => (
                                        <div key={type} className="space-y-2">
                                            <MealCardWithCheck title={type.charAt(0).toUpperCase() + type.slice(1)} data={todayData[type]} completed={meals.some(m => m.date === todayStr && m.predefinedId === type)} onToggle={() => toggleMeal(type, todayData[type])} />
                                            <div className="ml-14 flex gap-2">
                                                <input type="text" placeholder={'Extra ' + type + '...'} className="flex-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-[11px] outline-none shadow-sm focus:ring-1 ring-blue-300" value={mealExtras[type]} onChange={(e) => setMealExtras(prev => ({ ...prev, [type]: e.target.value }))} onKeyDown={(e) => e.key === 'Enter' && handleAI(mealExtras[type], type)} disabled={loadingCategory === type} />
                                                <button onClick={() => handleAI(mealExtras[type], type)} disabled={loadingCategory !== null || !mealExtras[type]} className="bg-blue-600 text-white p-2 rounded-xl active:scale-90 transition-transform">{loadingCategory === type ? <Icon name="Loader2" size={14} className="animate-spin" /> : <Icon name="PlusCircle" size={14} />}</button>
                                            </div>
                                        </div>
                                    ))}
                                </section>
                            </div>
                        )}

                        {view === 'settimana' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-black text-slate-800 px-1 tracking-tight">Programma Settimana</h2>
                                <div className="grid gap-4">
                                    {Object.entries(PIANO_SETTIMANALE).map(([day, plan]) => (
                                        <div key={day} className="bg-white rounded-[32px] border border-slate-100 p-5 space-y-4 shadow-sm">
                                            <div className="flex justify-between items-center border-b border-slate-50 pb-3"><h4 className="font-black text-lg text-slate-800">{day}</h4><span className="text-[9px] bg-orange-100 text-orange-600 px-3 py-1 rounded-full font-black uppercase tracking-widest">{plan.sport}</span></div>
                                            <div className="space-y-3">
                                                <div className="flex items-start gap-2"><div className="w-5 h-5 rounded-lg bg-indigo-50 text-indigo-500 flex items-center justify-center mt-0.5"><Icon name="Utensils" size={10}/></div><p className="text-[11px] text-slate-600 leading-tight"><b>Pranzo:</b> {plan.pranzo.text}</p></div>
                                                <div className="flex items-start gap-2"><div className="w-5 h-5 rounded-lg bg-orange-50 text-orange-500 flex items-center justify-center mt-0.5"><Icon name="Utensils" size={10}/></div><p className="text-[11px] text-slate-600 leading-tight"><b>Cena:</b> {plan.cena.text}</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'spesa' && (
                            <div className="space-y-6">
                                <div className="flex items-center gap-3 px-1">
                                    <div className="w-10 h-10 bg-emerald-600 text-white rounded-xl flex items-center justify-center shadow-lg"><Icon name="ShoppingBag" size={22}/></div>
                                    <div><h2 className="text-2xl font-black text-slate-800 tracking-tight leading-none">Spesa 3 Giorni</h2><p className="text-[10px] text-slate-400 font-bold uppercase mt-1">Oggi + prossimi 2 giorni</p></div>
                                </div>
                                <div className="bg-white rounded-[32px] border border-slate-100 divide-y overflow-hidden shadow-sm">
                                    {dynamicShoppingList.map((item, i) => (
                                        <div key={i} onClick={() => setShoppingChecks(prev => ({...prev, [item]: !prev[item]}))} className={'flex items-center gap-4 p-5 transition-colors active:bg-slate-50 ' + (shoppingChecks[item] ? 'bg-slate-50/50' : 'bg-white')}>
                                            <div className={'w-6 h-6 rounded-lg border-2 flex items-center justify-center transition-all ' + (shoppingChecks[item] ? 'bg-emerald-500 border-emerald-500' : 'border-slate-200')}>{shoppingChecks[item] && <Icon name="Check" size={14} className="text-white"/>}</div>
                                            <span className={'text-sm font-medium transition-all ' + (shoppingChecks[item] ? 'text-slate-300 line-through' : 'text-slate-700')}>{item}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'piano' && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-[32px] border p-6 shadow-sm space-y-6">
                                    <h3 className="text-xl font-black flex items-center gap-2 tracking-tight"><Icon name="TrendingDown" size={22} className="text-blue-600"/> Progresso Peso</h3>
                                    <div className="w-full bg-slate-50 rounded-2xl p-4 border border-slate-100 overflow-hidden">
                                        {weights.length >= 2 ? <WeightTrendChart data={weights} /> : <div className="h-32 flex flex-col items-center justify-center text-slate-400 gap-2"><Icon name="Activity" size={24} className="opacity-20 animate-pulse" /><p className="text-[10px] font-bold uppercase tracking-widest">Servono 2 pesate</p></div>}
                                    </div>
                                    <div className="flex gap-2">
                                        <input type="number" step="0.1" id="w-upd" placeholder="Registra peso..." className="flex-1 bg-slate-50 border-none rounded-2xl p-4 focus:ring-1 ring-blue-500 outline-none text-sm"/>
                                        <button onClick={() => { const e = document.getElementById('w-upd'); addWeight(e.value); e.value = ''; }} className="bg-blue-600 text-white px-8 rounded-2xl font-bold active:scale-95 transition-transform">Salva</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t p-3 pb-8 flex justify-around items-center z-40 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                        <NavButton active={view === 'home'} icon={<Icon name="Home" size={22}/>} label="Oggi" onClick={() => setView('home')} />
                        <NavButton active={view === 'settimana'} icon={<Icon name="ClipboardList" size={22}/>} label="Programma" onClick={() => setView('settimana')} />
                        <div className="relative -mt-10"><button onClick={() => setIsLogging(true)} className="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition-transform"><Icon name="Plus" size={28}/></button></div>
                        <NavButton active={view === 'spesa'} icon={<Icon name="ShoppingCart" size={22}/>} label="Spesa" onClick={() => setView('spesa')} />
                        <NavButton active={view === 'piano'} icon={<Icon name="Scale" size={22}/>} label="Peso" onClick={() => setView('piano')} />
                    </nav>

                    {isLoggingActivity && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end p-4">
                            <div className="bg-white w-full rounded-t-[40px] p-8 shadow-2xl max-w-md mx-auto">
                                <div className="flex justify-between items-center mb-6"><h3 className="text-xl font-black flex items-center gap-2"><Icon name="HeartPulse" className="text-orange-500"/> Dati App Salute</h3><button onClick={() => setIsLoggingActivity(false)} className="text-slate-400 font-bold uppercase text-xs">Annulla</button></div>
                                <p className="text-xs text-slate-500 mb-4 leading-relaxed">Inserisci le <b>Calorie Attive</b> che leggi su iPhone o Apple Watch per oggi.</p>
                                <input type="number" className="w-full bg-slate-50 rounded-2xl p-5 border border-slate-100 text-2xl font-black text-center text-orange-600 outline-none focus:ring-2 ring-orange-500" placeholder="0 kcal" value={activityInput} onChange={(e) => setActivityInput(e.target.value)} autoFocus />
                                <button onClick={() => logActivity(activityInput)} className="w-full py-5 rounded-2xl font-black bg-orange-500 text-white shadow-lg active:scale-95 mt-4">Sincronizza Bruciate</button>
                            </div>
                        </div>
                    )}

                    {isLogging && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end p-4">
                            <div className="bg-white w-full rounded-t-[40px] p-8 shadow-2xl max-w-md mx-auto">
                                <div className="flex justify-between items-center mb-6"><h3 className="text-xl font-black">Aggiungi Pasto</h3><button onClick={() => setIsLogging(false)} className="text-slate-400 font-bold uppercase text-xs p-2">Chiudi</button></div>
                                <div className="flex bg-slate-100 p-1 rounded-2xl mb-6">
                                    <button onClick={() => setLogType('text')} className={'flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-xs font-bold transition-all ' + (logType === 'text' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500')}><Icon name="Type" size={16}/> Testo</button>
                                    <button onClick={() => setLogType('barcode')} className={'flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-xs font-bold transition-all ' + (logType === 'barcode' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500')}><Icon name="ScanBarcode" size={16}/> Barcode</button>
                                </div>
                                <div className="space-y-4">
                                    {logType === 'text' ? (<><textarea className="w-full bg-slate-50 rounded-2xl p-4 h-28 outline-none border border-slate-100 text-sm" placeholder="Es: Pasta al pomodoro..." value={logInput} onChange={(e) => setLogInput(e.target.value)} disabled={loadingCategory === 'manual'}/><input type="text" placeholder="Quantità (es: 100g)" className="w-full bg-slate-50 rounded-2xl p-4 text-sm border border-slate-100" value={quantityInput} onChange={(e) => setQuantityInput(e.target.value)}/></>) : (<><input type="number" className="w-full bg-slate-50 rounded-2xl p-5 border border-slate-100 text-sm font-mono text-center tracking-widest outline-none" placeholder="Codice EAN..." value={barcodeInput} onChange={(e) => setBarcodeInput(e.target.value)}/><input type="number" placeholder="Grammi" className="w-full bg-slate-50 rounded-2xl p-4 text-sm border border-slate-100 outline-none mt-2" value={quantityInput} onChange={(e) => setQuantityInput(e.target.value)}/></>)}
                                    <button onClick={() => logType === 'text' ? handleAI(logInput, 'manual', quantityInput) : handleAI(barcodeInput, 'barcode', quantityInput)} disabled={loadingCategory !== null || (logType === 'text' ? !logInput : !barcodeInput)} className={'w-full py-5 rounded-2xl font-black flex items-center justify-center gap-2 transition-all ' + (loadingCategory ? 'bg-slate-200 text-slate-400' : 'bg-blue-600 text-white shadow-lg active:scale-95')}>{loadingCategory ? <Icon name="Loader2" size={20} className="animate-spin"/> : 'Analizza & Registra'}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
