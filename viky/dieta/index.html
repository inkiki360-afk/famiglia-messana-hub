<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Dieta – Obiettivo 80kg</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --success: #10b981;
            --danger: #ef4444;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.08), 0 2px 4px -2px rgba(0,0,0,0.06);
            --radius: 16px;
            --radius-sm: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0 0 2rem;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 0 1rem; }
        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 1.5rem 1rem 2rem;
            text-align: center;
            border-radius: 0 0 24px 24px;
            box-shadow: var(--shadow);
        }
        header h1 { font-size: 1.35rem; font-weight: 800; margin-bottom: 0.25rem; }
        header p { font-size: 0.8rem; opacity: 0.9; }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            color: rgba(255,255,255,0.9);
            font-size: 0.75rem;
            text-decoration: none;
            margin-bottom: 0.75rem;
        }
        .back-link:hover { text-decoration: underline; }
        .today-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }
        main { padding: 1.25rem 0; }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card h2 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        .input-wrap { position: relative; }
        .autocomplete-list {
            position: absolute;
            left: 0; right: 0;
            top: 100%;
            background: var(--card);
            border: 2px solid var(--border);
            border-top: none;
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
            max-height: 220px;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .autocomplete-list:empty { display: none; }
        .autocomplete-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-size: 0.95rem;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover, .autocomplete-item.selected { background: #f1f5f9; }
        .autocomplete-item span:last-child { font-size: 0.8rem; color: var(--text-muted); }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.9rem 1.25rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
        }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-ghost {
            background: #f1f5f9;
            color: var(--text);
        }
        .btn-ghost:hover { background: #e2e8f0; }
        .btn-danger { background: #fef2f2; color: var(--danger); }
        .btn-danger:hover { background: #fee2e2; }
        .msg {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .msg-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .msg-success { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
        .msg-hide { display: none; }
        .total-box {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            padding: 1.25rem;
            border-radius: var(--radius);
            text-align: center;
            margin-bottom: 1rem;
        }
        .total-box .label { font-size: 0.75rem; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.05em; }
        .total-box .value { font-size: 2rem; font-weight: 800; }
        .entry-list { list-style: none; }
        .entry-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 0;
            border-bottom: 1px solid var(--border);
            gap: 0.75rem;
        }
        .entry-item:last-child { border-bottom: none; }
        .entry-item .name { font-weight: 600; flex: 1; min-width: 0; }
        .entry-item .meta { font-size: 0.8rem; color: var(--text-muted); }
        .entry-item .kcal { font-weight: 700; color: var(--primary); }
        .entry-item .actions { display: flex; align-items: center; gap: 0.5rem; }
        .entry-item button { padding: 0.5rem; border: none; background: none; cursor: pointer; color: var(--text-muted); border-radius: 8px; }
        .entry-item button:hover { color: var(--danger); background: #fef2f2; }
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .empty-state i { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5; }
        .reset-row { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
        .filter-wrap { margin-bottom: 1rem; }
        .filter-wrap input { margin-bottom: 0; }
        @media (min-width: 500px) {
            .container { padding: 0 1.5rem; }
            header { padding: 2rem 1.5rem 2.5rem; }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="back-link" aria-label="Torna a Spazio Viky"><i class="fas fa-arrow-left"></i> Spazio Viky</a>
        <h1>App Dieta – Obiettivo 80kg</h1>
        <p>Conta le calorie in modo semplice</p>
        <span class="today-badge" id="today-badge"></span>
    </header>

    <main class="container">
        <div id="message" class="msg msg-hide" role="alert"></div>

        <section class="card">
            <h2><i class="fas fa-search fa-fw"></i> Cerca alimento</h2>
            <div class="filter-wrap">
                <label for="filter">Filtro rapido (opzionale)</label>
                <input type="text" id="filter" placeholder="Es: pasta, frutta..." autocomplete="off">
            </div>
            <div class="input-wrap">
                <label for="food-input">Alimento</label>
                <input type="text" id="food-input" placeholder="Scrivi il nome dell'alimento..." autocomplete="off" aria-autocomplete="list" aria-controls="autocomplete-list" aria-expanded="false">
                <div id="autocomplete-list" class="autocomplete-list" role="listbox"></div>
            </div>
            <label for="grams-input">Grammi</label>
            <input type="number" id="grams-input" placeholder="Es: 100" min="1" max="9999" step="1" inputmode="numeric">
            <button type="button" id="btn-add" class="btn btn-primary" disabled>
                <i class="fas fa-plus"></i> Calcola e aggiungi
            </button>
        </section>

        <section class="card">
            <div class="total-box">
                <div class="label">Calorie totali oggi</div>
                <div class="value" id="total-kcal">0</div>
            </div>
            <h2><i class="fas fa-list fa-fw"></i> Cibi aggiunti oggi</h2>
            <ul class="entry-list" id="entry-list"></ul>
            <div id="empty-state" class="empty-state">
                <i class="fas fa-utensils"></i>
                <p>Nessun alimento aggiunto. Usa il modulo sopra per iniziare.</p>
            </div>
            <div class="reset-row">
                <button type="button" id="btn-reset" class="btn btn-ghost" style="width:100%">
                    <i class="fas fa-trash-alt"></i> Azzera la giornata
                </button>
            </div>
        </section>
    </main>

    <script>
(function () {
        'use strict';

        var STORAGE_PREFIX = 'dieta-80kg-';
        var FOODS = {
            'banana': 89,
            'mela': 52,
            'pera': 57,
            'arancia': 47,
            'uva': 69,
            'fragole': 32,
            'pane': 265,
            'pasta secca': 353,
            'riso secco': 360,
            'pollo petto': 165,
            'tacchino': 135,
            'tonno naturale': 116,
            'salmone': 208,
            'uova': 155,
            'latte parzialmente scremato': 46,
            'yogurt greco': 97,
            'parmigiano': 431,
            'mozzarella': 280,
            'olio extravergine': 884,
            'mandorle': 579,
            'noci': 654,
            'pizza margherita': 270,
            'patate': 77,
            'zucchine': 17,
            'broccoli': 34,
            'carote': 41,
            'pomodori': 18,
            'ceci cotti': 164,
            'lenticchie cotte': 116,
            'fagioli cotti': 127
        };

        function todayKey() {
            var d = new Date();
            var y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + day;
        }

        function loadDay(dayKey) {
            try {
                var raw = localStorage.getItem(STORAGE_PREFIX + dayKey);
                return raw ? JSON.parse(raw) : [];
            } catch (e) { return []; }
        }

        function saveDay(dayKey, entries) {
            try {
                localStorage.setItem(STORAGE_PREFIX + dayKey, JSON.stringify(entries));
            } catch (e) { console.warn('localStorage save failed', e); }
        }

        function normalize(str) {
            return (str || '').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }

        function filterFoods(query, filterText) {
            var nq = normalize(query);
            var nf = normalize(filterText);
            var names = Object.keys(FOODS);
            if (nf) names = names.filter(function (n) { return n.indexOf(nf) !== -1; });
            if (!nq) return names.slice(0, 12);
            return names.filter(function (n) { return n.indexOf(nq) !== -1; }).slice(0, 12);
        }

        function findFood(name) {
            var n = normalize(name);
            var key = Object.keys(FOODS).find(function (k) { return normalize(k) === n; });
            return key != null ? { name: key, kcalPer100: FOODS[key] } : null;
        }

        function showMessage(text, isError) {
            var el = document.getElementById('message');
            el.textContent = text;
            el.className = 'msg ' + (isError ? 'msg-error' : 'msg-success');
            el.classList.remove('msg-hide');
            clearTimeout(window._msgTimer);
            window._msgTimer = setTimeout(function () { el.classList.add('msg-hide'); }, 3000);
        }

        function renderEntries(entries) {
            var list = document.getElementById('entry-list');
            var empty = document.getElementById('empty-state');
            list.innerHTML = '';
            var total = 0;
            entries.forEach(function (e, i) {
                total += e.calories;
                var li = document.createElement('li');
                li.className = 'entry-item';
                li.innerHTML =
                    '<div><span class="name">' + escapeHtml(e.name) + '</span><div class="meta">' + e.grams + ' g &middot; ' + e.kcalPer100 + ' kcal/100g</div></div>' +
                    '<span class="kcal">' + Math.round(e.calories) + ' kcal</span>' +
                    '<div class="actions"><button type="button" data-index="' + i + '" aria-label="Elimina"><i class="fas fa-trash-alt"></i></button></div>';
                list.appendChild(li);
            });
            document.getElementById('total-kcal').textContent = Math.round(total);
            empty.style.display = entries.length ? 'none' : 'block';
        }

        function escapeHtml(s) {
            var div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function renderAutocomplete(names, selectedIndex) {
            var list = document.getElementById('autocomplete-list');
            list.innerHTML = '';
            list.setAttribute('aria-expanded', names.length ? 'true' : 'false');
            names.forEach(function (name, i) {
                var kcal = FOODS[name];
                var div = document.createElement('div');
                div.className = 'autocomplete-item' + (i === selectedIndex ? ' selected' : '');
                div.setAttribute('role', 'option');
                div.setAttribute('data-name', name);
                div.innerHTML = '<span>' + escapeHtml(name) + '</span><span>' + kcal + ' kcal/100g</span>';
                list.appendChild(div);
            });
        }

        function hideAutocomplete() {
            var list = document.getElementById('autocomplete-list');
            list.innerHTML = '';
            list.setAttribute('aria-expanded', 'false');
        }

        var state = {
            dayKey: todayKey(),
            entries: [],
            autocompleteIndex: -1
        };

        function loadAndRender() {
            state.entries = loadDay(state.dayKey);
            renderEntries(state.entries);
        }

        function addEntry(name, grams) {
            var found = findFood(name);
            if (!found) {
                showMessage('Alimento non trovato nel database. Controlla il nome o scegli dalla lista mentre digiti.', true);
                return false;
            }
            var calories = (found.kcalPer100 / 100) * grams;
            state.entries.push({
                name: found.name,
                grams: grams,
                kcalPer100: found.kcalPer100,
                calories: calories
            });
            saveDay(state.dayKey, state.entries);
            renderEntries(state.entries);
            showMessage('Aggiunto: ' + found.name + ' (' + Math.round(calories) + ' kcal)', false);
            return true;
        }

        function removeEntry(index) {
            state.entries.splice(index, 1);
            saveDay(state.dayKey, state.entries);
            loadAndRender();
        }

        function resetDay() {
            if (state.entries.length === 0) return;
            if (!confirm('Vuoi azzerare tutti gli alimenti di oggi?')) return;
            state.entries = [];
            saveDay(state.dayKey, state.entries);
            loadAndRender();
            showMessage('Giornata azzerata.', false);
        }

        // Today badge
        document.getElementById('today-badge').textContent = 'Oggi: ' + state.dayKey;

        // Filter: only affects autocomplete suggestions
        var filterEl = document.getElementById('filter');
        var foodInput = document.getElementById('food-input');
        var gramsInput = document.getElementById('grams-input');
        var btnAdd = document.getElementById('btn-add');
        var autocompleteList = document.getElementById('autocomplete-list');

        function updateAddButton() {
            var name = foodInput.value.trim();
            var grams = parseInt(gramsInput.value, 10);
            btnAdd.disabled = !name || !grams || grams < 1;
        }

        function openAutocomplete() {
            var query = foodInput.value.trim();
            var names = filterFoods(query, filterEl.value.trim());
            state.autocompleteIndex = -1;
            renderAutocomplete(names, -1);
        }

        foodInput.addEventListener('input', function () {
            updateAddButton();
            openAutocomplete();
        });
        foodInput.addEventListener('focus', function () { openAutocomplete(); });
        foodInput.addEventListener('blur', function () {
            setTimeout(hideAutocomplete, 200);
        });
        filterEl.addEventListener('input', function () { openAutocomplete(); });

        foodInput.addEventListener('keydown', function (e) {
            var items = autocompleteList.querySelectorAll('.autocomplete-item');
            if (items.length === 0) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                state.autocompleteIndex = Math.min(state.autocompleteIndex + 1, items.length - 1);
                items.forEach(function (el, i) { el.classList.toggle('selected', i === state.autocompleteIndex); });
                items[state.autocompleteIndex].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                state.autocompleteIndex = Math.max(state.autocompleteIndex - 1, -1);
                items.forEach(function (el, i) { el.classList.toggle('selected', i === state.autocompleteIndex); });
                if (state.autocompleteIndex >= 0) items[state.autocompleteIndex].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'Enter' && state.autocompleteIndex >= 0 && items[state.autocompleteIndex]) {
                e.preventDefault();
                var name = items[state.autocompleteIndex].getAttribute('data-name');
                foodInput.value = name;
                hideAutocomplete();
                gramsInput.focus();
            }
        });

        autocompleteList.addEventListener('click', function (e) {
            var item = e.target.closest('.autocomplete-item');
            if (!item) return;
            var name = item.getAttribute('data-name');
            if (name) {
                foodInput.value = name;
                hideAutocomplete();
                gramsInput.focus();
                updateAddButton();
            }
        });

        gramsInput.addEventListener('input', updateAddButton);

        btnAdd.addEventListener('click', function () {
            var name = foodInput.value.trim();
            var grams = parseInt(gramsInput.value, 10);
            if (!name || !grams || grams < 1) return;
            if (addEntry(name, grams)) {
                foodInput.value = '';
                gramsInput.value = '';
                updateAddButton();
                hideAutocomplete();
                foodInput.focus();
            }
        });

        document.getElementById('entry-list').addEventListener('click', function (e) {
            var btn = e.target.closest('button[data-index]');
            if (!btn) return;
            var index = parseInt(btn.getAttribute('data-index'), 10);
            removeEntry(index);
        });

        document.getElementById('btn-reset').addEventListener('click', resetDay);

        loadAndRender();
        updateAddButton();
})();
    </script>
</body>
</html>
