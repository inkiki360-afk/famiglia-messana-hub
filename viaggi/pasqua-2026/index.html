      {

          "O zona Versilia (Forte dei Marmi)"
        ],

        ],

      },
      {
        id: 7,
        dayOfMonth: 9,
        date: "Giovedì 9 Aprile",
        title: "Costa → Pisa → Legnano",
        distance: "400 km",
        time: "6h totali",
        stay: "Rientro",
        status: "Pianificato",
        activities: [
          "Foto di rito alla Torre Pendente",
          "Visita guidata a Piazza dei Miracoli",
          "Pranzo veloce e rientro verso Legnano"
        ],
        type: "return"
      }

    var state = {
      activeTab: 1,
      showLogistics: false,
      showBooking: false,
      showBookingCasale: false,
      showEmailPiemma: false,
      showSavedToast: false
    };

    var NOTES_STORAGE_KEY = "famiglia-messana-pasqua2026-day-notes";

    function loadNotesMap() {
      try {
        var raw = localStorage.getItem(NOTES_STORAGE_KEY);
        if (!raw) return {};
        var o = JSON.parse(raw);
        return typeof o === "object" && o !== null ? o : {};
      } catch (e) {
        return {};
      }
    }

    function getNoteForDay(dayId) {
      var m = loadNotesMap();
      var v = m[String(dayId)];
      return v == null ? "" : String(v);
    }

    function escTextareaContent(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function saveDayNote() {
      var ta = document.getElementById("day-note-field");
      if (!ta) return;
      var id = String(state.activeTab);
      var m = loadNotesMap();
      m[id] = ta.value;
      try {
        localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(m));
      } catch (e) {
        alert("Impossibile salvare le note (spazio esaurito o navigazione privata).");
        return;
      }
      state.showSavedToast = true;
      render();
      if (window._noteToastTimer) clearTimeout(window._noteToastTimer);
      window._noteToastTimer = setTimeout(function () {
        state.showSavedToast = false;
        render();
      }, 2500);
    }

    function esc(s) {
      if (s == null) return "";
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function getActiveDay() {
      return tripData.find(function (d) { return d.id === state.activeTab; });
    }

    function statusClass(status) {
      if (status === "Confermato") return "bg-green-100 text-green-700";
      if (status === "Non ancora definito") return "bg-amber-100 text-amber-700";
      return "bg-slate-200 text-slate-600";
    }

    function setTab(id) {
      state.activeTab = id;
      state.showBooking = false;
      state.showBookingCasale = false;
      state.showEmailPiemma = false;
      state.showSavedToast = false;
      if (window._noteToastTimer) clearTimeout(window._noteToastTimer);
      render();
    }

    function toggleLogistics() {
      state.showLogistics = !state.showLogistics;
      render();
    }

    function toggleBooking() {
      state.showBooking = !state.showBooking;
      render();
    }

    function toggleBookingCasale() {
      state.showBookingCasale = !state.showBookingCasale;
      render();
    }

    function toggleEmailPiemma() {
      state.showEmailPiemma = !state.showEmailPiemma;
      render();
    }

    function prevDay() {
      if (state.activeTab > 1) setTab(state.activeTab - 1);
    }

    function nextDay() {
      if (state.activeTab < tripData.length) setTab(state.activeTab + 1);
    }

    function renderOptionsHtml(activeDay) {
      if (!activeDay.options) return "";
      var html = '<div class="space-y-4">';
      activeDay.options.forEach(function (opt) {
        html += '<div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">';
        html += '<div class="p-4">';
        html += '<h4 class="font-bold text-blue-800 mb-2 text-base">' + esc(opt.name) + "</h4>";
        html += '<div class="space-y-2">';
        opt.pros.forEach(function (p) {
          html += '<div class="flex items-start gap-2 text-sm text-slate-800 leading-snug"><span class="icon-box text-green-500 mt-0.5 flex-shrink-0"><i class="fas fa-circle-check" aria-hidden="true"></i></span><span>' + esc(p) + "</span></div>";
        });
        opt.cons.forEach(function (c) {
          html += '<div class="flex items-start gap-2 text-sm text-slate-500 italic leading-snug"><span class="icon-box text-amber-500 mt-0.5 flex-shrink-0"><i class="fas fa-triangle-exclamation" aria-hidden="true"></i></span><span>' + esc(c) + "</span></div>";
        });
        html += "</div>";
        if (opt.email) {
          html += '<div class="mt-4 border-t border-slate-100 pt-3">';
          html += '<button type="button" onclick="toggleEmailPiemma()" class="flex items-center gap-2 text-xs font-bold text-amber-700 bg-amber-50 px-3 py-2.5 rounded-xl w-full justify-between border border-amber-100">';
          html += '<div class="flex items-center gap-2"><i class="fas fa-envelope" aria-hidden="true"></i> Nota sulla disponibilità (Alberto)</div>';
          html += '<i class="fas ' + (state.showEmailPiemma ? "fa-chevron-down" : "fa-chevron-right") + '" aria-hidden="true"></i>';
          html += "</button>";
          if (state.showEmailPiemma) {
            html += '<div class="mt-2 p-3 bg-amber-50/50 border border-amber-200 rounded-xl text-xs text-slate-700 leading-relaxed animate-fade">';
            html += '<p class="mb-2 italic text-slate-600">"Purtroppo siamo quasi al completo e non riusciamo più a gestire nuove prenotazioni."</p>';
            html += '<div class="flex items-start gap-2 bg-amber-100/80 p-2.5 rounded-lg text-amber-900 font-bold text-[11px]">';
            html += '<i class="fas fa-triangle-exclamation flex-shrink-0 mt-0.5" aria-hidden="true"></i>';
            html += "<p>CONSIGLIO: Arrivare prima di mezzogiorno per tentare di trovare una piazzola libera.</p></div>";
            html += '<p class="mt-2 text-[10px] text-slate-500">Contatto: +39 0577 907134</p></div>';
          }
          html += "</div>";
        }
        html += "</div></div>";
      });
      html += "</div>";
      return html;
    }

    function renderStaySection(activeDay) {
      if (activeDay.options) {
        return renderOptionsHtml(activeDay);
      }
      var details = activeDay.stayDetails || [];
      var html = '<div class="space-y-3">';
      html += '<div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 shadow-sm">';
      html += '<p class="font-bold text-blue-950 text-base">' + esc(activeDay.stay || "—") + "</p>";
      if (details.length) {
        html += '<ul class="mt-2 space-y-1.5">';
        details.forEach(function (detail) {
          html += '<li class="text-sm text-blue-900 flex items-start gap-2 leading-snug"><span class="w-1.5 h-1.5 bg-blue-500 rounded-full flex-shrink-0 mt-2"></span>' + esc(detail) + "</li>";
        });
        html += "</ul>";
      }
      html += "</div>";

      if (activeDay.booking) {
        html += '<div class="border border-slate-200 rounded-2xl overflow-hidden bg-white shadow-sm">';
        html += '<button type="button" onclick="toggleBooking()" class="w-full flex items-center justify-between p-4 bg-slate-50 hover:bg-slate-100 transition-colors text-left">';
        html += '<div class="flex items-center gap-2 text-slate-800 font-bold text-sm"><span class="icon-box text-slate-600"><i class="fas fa-receipt" aria-hidden="true"></i></span> Dettagli Prenotazione e Pagamenti</div>';
        html += '<i class="fas ' + (state.showBooking ? "fa-chevron-down" : "fa-chevron-right") + ' text-slate-400" aria-hidden="true"></i>';
        html += "</button>";
        if (state.showBooking) {
          html += '<div class="p-4 border-t border-slate-100 space-y-4 animate-fade">';
          html += '<div class="grid grid-cols-2 gap-3">';
          html += '<div class="bg-green-50 p-3 rounded-xl border border-green-100"><p class="text-[10px] uppercase font-bold text-green-700 mb-1">Caparra Versata</p>';
          html += '<p class="text-lg font-black text-green-800">€ ' + esc(activeDay.booking.deposit) + "</p></div>";
          html += '<div class="bg-amber-50 p-3 rounded-xl border border-amber-100"><p class="text-[10px] uppercase font-bold text-amber-700 mb-1">Saldo Mancante</p>';
          html += '<p class="text-lg font-black text-amber-800">€ ' + esc(activeDay.booking.balance) + "</p></div></div>";
          html += '<div class="space-y-2 text-sm">';
          html += '<div class="flex justify-between py-1 border-b border-slate-100 italic text-slate-600"><span>Totale Preventivo:</span><span class="font-bold not-italic text-slate-800">€ ' + esc(activeDay.booking.total) + " + tassa sogg.</span></div>";
          html += '<div class="flex justify-between py-1"><span class="text-slate-600">Check-in:</span><span class="font-bold text-slate-900">' + esc(activeDay.booking.checkIn) + "</span></div>";
          html += '<div class="flex justify-between py-1"><span class="text-slate-600">Check-out:</span><span class="font-bold text-slate-900">entro le ' + esc(activeDay.booking.checkOut) + "</span></div></div></div>";
        }
        html += "</div>";
      }

      if (activeDay.bookingCasale) {
        var bc = activeDay.bookingCasale;
        html += '<div class="border border-slate-200 rounded-2xl overflow-hidden bg-white shadow-sm">';
        html += '<button type="button" onclick="toggleBookingCasale()" class="w-full flex items-center justify-between p-4 bg-slate-800 text-white hover:bg-slate-900 transition-colors text-left">';
        html += '<div class="flex items-center gap-2 font-bold text-sm"><i class="fas fa-circle-check text-emerald-400" aria-hidden="true"></i> Dettagli Prenotazione Casale</div>';
        html += '<i class="fas ' + (state.showBookingCasale ? "fa-chevron-down" : "fa-chevron-right") + ' opacity-60" aria-hidden="true"></i>';
        html += "</button>";
        if (state.showBookingCasale) {
          html += '<div class="p-4 border-t border-slate-100 space-y-4 animate-fade">';
          if (bc.dates && bc.dates !== "Soggiorno in corso") {
            html += '<p class="text-center text-xs font-bold text-slate-600">' + esc(bc.dates) + "</p>";
          }
          html += '<div class="grid grid-cols-2 gap-3 text-center">';
          html += '<div class="bg-slate-50 p-2 rounded-xl"><p class="text-[10px] uppercase text-slate-500 font-bold">Check-in</p>';
          html += '<p class="text-xs font-bold text-slate-800">' + esc(bc.checkIn) + "</p></div>";
          html += '<div class="bg-slate-50 p-2 rounded-xl"><p class="text-[10px] uppercase text-slate-500 font-bold">Check-out</p>';
          html += '<p class="text-xs font-bold text-slate-800">' + esc(bc.checkOut) + "</p></div></div>";
          html += '<div class="bg-emerald-50 p-3 rounded-xl flex items-start gap-3 border border-emerald-100">';
          html += '<span class="icon-box icon-lg text-emerald-600 flex-shrink-0"><i class="fas fa-mug-hot" aria-hidden="true"></i></span>';
          html += '<div><p class="text-xs font-bold text-emerald-900">Colazione in Terrazza</p>';
          html += '<p class="text-[11px] text-emerald-800 mt-0.5">Disponibile su prenotazione a 10€/persona presso il ristorante.</p></div></div>';
          html += '<div class="space-y-2"><p class="text-xs font-bold text-slate-500 uppercase tracking-widest px-1">Documentazione</p>';
          html += '<div class="flex flex-col sm:flex-row gap-2">';
          html += '<a href="' + esc(bc.menuUrl) + '" target="_blank" rel="noopener noreferrer" class="flex-1 bg-blue-50 text-blue-800 text-[11px] font-bold py-3 px-2 rounded-xl flex items-center justify-center gap-2 border border-blue-200 hover:bg-blue-100">';
          html += '<i class="fas fa-utensils" aria-hidden="true"></i> Menu <i class="fas fa-arrow-up-right-from-square text-[10px]" aria-hidden="true"></i></a>';
          html += '<a href="' + esc(bc.catalogUrl) + '" target="_blank" rel="noopener noreferrer" class="flex-1 bg-blue-50 text-blue-800 text-[11px] font-bold py-3 px-2 rounded-xl flex items-center justify-center gap-2 border border-blue-200 hover:bg-blue-100">';
          html += '<i class="fas fa-circle-info" aria-hidden="true"></i> Catalogo <i class="fas fa-arrow-up-right-from-square text-[10px]" aria-hidden="true"></i></a>';
          html += "</div></div>";
          html += '<div class="pt-2 border-t border-slate-100"><span class="text-[10px] text-slate-500 font-medium">Contatto: ' + esc(bc.contact) + "</span></div></div>";
        }
        html += "</div>";
      }
      html += "</div>";
      return html;
    }

    function render() {
      var activeDay = getActiveDay();
      if (!activeDay) return;

      var lunchHtml = "";
      if (activeDay.lunchReserved) {
        lunchHtml =
          '<div class="mb-6 bg-gradient-to-r from-orange-500 to-amber-500 p-1 rounded-2xl shadow-md">' +
          '<div class="bg-white p-4 rounded-[calc(1rem-2px)] flex flex-wrap items-center justify-between gap-3">' +
          '<div class="flex items-center gap-3 min-w-0">' +
          '<div class="bg-orange-100 p-2.5 rounded-xl text-orange-600 icon-box icon-lg flex-shrink-0"><i class="fas fa-bowl-food" aria-hidden="true"></i></div>' +
          '<div class="min-w-0"><p class="text-[10px] font-black text-orange-600 uppercase tracking-wider">Pranzo Prenotato</p>' +
          '<p class="text-lg font-bold text-slate-900">Ore ' + esc(activeDay.lunchReserved.time) + "</p></div></div>" +
          '<div class="text-right"><p class="text-xs font-semibold text-slate-600">' + esc(activeDay.lunchReserved.location) + "</p>" +
          '<p class="text-[10px] text-slate-500 italic">Tavolo riservato</p></div></div></div>';
      }

      var activitiesHtml = "";
      activeDay.activities.forEach(function (act, i) {
        var isFood = act.indexOf("Cena") !== -1 || act.indexOf("Pranzo") !== -1;
        var iconClass = isFood ? "fa-utensils" : "fa-chevron-right";
        var border = i !== activeDay.activities.length - 1 ? " border-b border-slate-100" : "";
        activitiesHtml +=
          '<div class="p-4 flex items-center gap-3' + border + '">' +
          '<div class="w-9 h-9 bg-slate-100 rounded-full flex items-center justify-center text-blue-600 flex-shrink-0 icon-box">' +
          '<i class="fas ' + iconClass + '" aria-hidden="true"></i></div>' +
          '<span class="text-sm font-medium text-slate-800 leading-snug">' + esc(act) + "</span></div>";
      });

      var logisticsHtml = "";
      if (state.showLogistics) {
        logisticsHtml =
          '<div class="mt-4 space-y-3 animate-fade">' +
          '<div class="bg-blue-50 p-4 rounded-2xl flex gap-3 border border-blue-100">' +
          '<span class="icon-box text-blue-600 flex-shrink-0"><i class="fas fa-route" aria-hidden="true"></i></span>' +
          '<p class="text-sm text-blue-950 font-medium leading-relaxed">Pianificazione basata su un camper da 7 metri. I tempi di guida tengono conto di una velocità media ridotta del 20%.</p></div>' +
          '<div class="bg-purple-50 p-4 rounded-2xl flex gap-3 border border-purple-100">' +
          '<span class="icon-box text-purple-600 flex-shrink-0"><i class="fas fa-users" aria-hidden="true"></i></span>' +
          '<p class="text-sm text-purple-950 font-medium leading-relaxed">Le attività sono pensate per una famiglia. A San Gimignano e Pienza le strade sono pedonali: parcheggiare nelle aree indicate e procedere a piedi.</p></div></div>';
      }

      var dayTabsHtml = tripData
        .map(function (day) {
          var active = day.id === state.activeTab;
          var hasNote = getNoteForDay(day.id).trim().length > 0;
          var noteMark = hasNote
            ? '<span class="absolute -top-0.5 -right-0.5 min-w-[14px] h-3.5 px-0.5 flex items-center justify-center rounded bg-amber-400 text-[8px] font-black text-amber-950 leading-none" title="Note salvate">N</span>'
            : "";
          return (
            '<button type="button" onclick="setTab(' +
            day.id +
            ')" class="relative flex-shrink-0 w-12 h-12 rounded-2xl flex flex-col items-center justify-center transition-all ' +
            (active ? "bg-white text-blue-700 scale-110 shadow-lg ring-2 ring-white/50" : "bg-blue-600 text-white opacity-80 hover:opacity-100") +
            '"><span class="text-xs font-bold leading-none">' +
            day.dayOfMonth +
            '</span><span class="text-[10px] uppercase font-semibold">Apr</span>' +
            noteMark +
            "</button>"
          );
        })
        .join("");

      var notesSection =
        '<section class="mb-8 rounded-2xl border-2 border-indigo-200 bg-gradient-to-b from-indigo-50 to-white p-4 sm:p-5 shadow-md">' +
        '<div class="flex items-center gap-2 mb-3">' +
        '<span class="flex h-9 w-9 items-center justify-center rounded-xl bg-indigo-600 text-white icon-box"><i class="fas fa-pen-to-square" aria-hidden="true"></i></span>' +
        '<div><h3 class="text-sm font-extrabold uppercase tracking-wide text-indigo-900">Le tue note</h3>' +
        '<p class="text-xs text-indigo-700/80 font-medium">Giorno ' +
        activeDay.id +
        " · " +
        esc(activeDay.date) +
        "</p></div></div>" +
        '<label for="day-note-field" class="sr-only">Note per questo giorno</label>' +
        '<textarea id="day-note-field" rows="5" class="w-full rounded-xl border-2 border-slate-300 bg-white px-3.5 py-3 text-base text-slate-900 placeholder:text-slate-400 shadow-inner focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 outline-none resize-y min-h-[9rem] leading-relaxed">' +
        escTextareaContent(getNoteForDay(activeDay.id)) +
        "</textarea>" +
        '<div class="mt-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">' +
        '<p class="text-xs text-slate-600 order-2 sm:order-1"><i class="fas fa-lock mr-1 text-slate-400" aria-hidden="true"></i>Salvate solo su questo dispositivo.</p>' +
        '<div class="flex items-center justify-end gap-3 order-1 sm:order-2">' +
        '<span id="note-feedback" class="text-sm font-bold text-emerald-600 min-h-[1.25rem]" aria-live="polite">' +
        (state.showSavedToast ? "Salvato!" : "") +
        "</span>" +
        '<button type="button" onclick="saveDayNote()" class="inline-flex items-center justify-center gap-2 rounded-xl bg-indigo-600 px-5 py-3 text-sm font-bold text-white shadow-md hover:bg-indigo-700 active:scale-[0.98] transition-all">' +
        '<i class="fas fa-floppy-disk" aria-hidden="true"></i> Salva</button></div></div></section>';

      var root =
        '<div class="trip-shell min-h-screen bg-slate-50 font-sans text-slate-900 relative">' +
        '<header class="bg-blue-700 text-white px-5 pt-6 pb-5 shadow-lg rounded-b-3xl">' +
        '<div class="flex justify-between items-center mb-4">' +
        '<h1 class="text-2xl font-bold tracking-tight">In Viaggio! 🚐</h1>' +
        '<div class="bg-blue-600 p-2.5 rounded-full icon-box icon-lg text-white"><i class="fas fa-calendar-days" aria-hidden="true"></i></div></div>' +
        '<div class="inline-flex items-center gap-2 rounded-full px-3 py-1.5 text-xs font-medium text-blue-50" style="background:rgba(30,58,138,0.45)">' +
        '<span class="icon-box icon-sm"><i class="fas fa-clock" aria-hidden="true"></i></span><span>Partenza Oggi: ' +
        esc(tripData[0].date) +
        "</span></div>" +
        '<div class="flex gap-3 mt-5 overflow-x-auto pb-1 no-scrollbar -mx-1 px-1">' +
        dayTabsHtml +
        "</div></header>" +
        '<main class="px-4 pt-6 pb-4">' +
        lunchHtml +
        '<div class="grid grid-cols-2 gap-3 mb-6">' +
        '<div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-3">' +
        '<div class="icon-box h-10 w-10 shrink-0 rounded-lg bg-blue-50 text-blue-600"><i class="fas fa-route" aria-hidden="true"></i></div>' +
        '<div class="min-w-0"><p class="text-xs text-slate-500 font-medium">Distanza</p><p class="font-bold text-slate-900 truncate">' +
        esc(activeDay.distance) +
        "</p></div></div>" +
        '<div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-3">' +
        '<div class="icon-box h-10 w-10 shrink-0 rounded-lg bg-orange-50 text-orange-600"><i class="fas fa-clock" aria-hidden="true"></i></div>' +
        '<div class="min-w-0"><p class="text-xs text-slate-500 font-medium">Tempo Camper</p><p class="font-bold text-slate-900 truncate">' +
        esc(activeDay.time) +
        "</p></div></div></div>" +
        '<div class="mb-6">' +
        '<div class="flex items-start justify-between gap-3">' +
        '<h2 class="text-xl font-bold flex items-start gap-2 text-slate-900 leading-tight"><span class="icon-box text-blue-600 mt-0.5 flex-shrink-0"><i class="fas fa-location-dot" aria-hidden="true"></i></span><span>' +
        esc(activeDay.title) +
        "</span></h2>" +
        '<span class="text-[10px] px-2 py-1 rounded-lg font-black uppercase flex-shrink-0 whitespace-nowrap ' +
        statusClass(activeDay.status) +
        '">' +
        esc(activeDay.status) +
        "</span></div>" +
        '<p class="text-slate-600 text-sm mt-2 font-medium">' +
        esc(activeDay.date) +
        " | Giorno " +
        activeDay.id +
        "</p></div>" +
        '<section class="mb-6"><h3 class="text-xs font-bold uppercase text-slate-500 mb-3 tracking-wider flex items-center gap-2">' +
        '<i class="fas fa-campground w-4 h-4 text-slate-400" aria-hidden="true"></i> Pernottamento e Sosta</h3>' +
        renderStaySection(activeDay) +
        "</section>" +
        '<section class="mb-6"><h3 class="text-xs font-bold uppercase text-slate-500 mb-3 tracking-wider flex items-center gap-2">' +
        '<i class="fas fa-camera w-4 h-4 text-slate-400" aria-hidden="true"></i> Cosa Fare</h3>' +
        '<div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">' +
        activitiesHtml +
        "</div></section>" +
        notesSection +
        '<button type="button" onclick="toggleLogistics()" class="w-full bg-slate-800 hover:bg-slate-900 text-white p-4 rounded-2xl flex justify-between items-center transition-colors">' +
        '<div class="flex items-center gap-3"><span class="icon-box text-blue-400"><i class="fas fa-circle-info" aria-hidden="true"></i></span><span class="font-bold">Info Logistica & Camper</span></div>' +
        '<i class="fas ' +
        (state.showLogistics ? "fa-chevron-down" : "fa-chevron-right") +
        '" aria-hidden="true"></i></button>' +
        logisticsHtml +
        "</main>" +
        '<nav class="fixed bottom-0 left-0 right-0 z-[60] border-t border-slate-200 bg-white/95 backdrop-blur-md shadow-[0_-4px_24px_rgba(0,0,0,0.08)]">' +
        '<div class="trip-shell flex justify-around items-center px-2 py-3 safe-area-pb">' +
        '<button type="button" onclick="prevDay()" class="flex flex-col items-center gap-1 text-slate-500 min-w-[4rem]">' +
        '<div class="p-2 rounded-xl transition-colors ' +
        (state.activeTab > 1 ? "bg-slate-100 text-slate-900" : "opacity-40") +
        '"><i class="fas fa-chevron-left text-lg" aria-hidden="true"></i></div>' +
        '<span class="text-[10px] font-bold uppercase tracking-wide">Indietro</span></button>' +
        '<div class="h-10 w-px bg-slate-200"></div>' +
        '<div class="flex flex-col items-center px-2"><div class="bg-blue-100 text-blue-800 px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-wide">Giorno ' +
        state.activeTab +
        "</div></div>" +
        '<div class="h-10 w-px bg-slate-200"></div>' +
        '<button type="button" onclick="nextDay()" class="flex flex-col items-center gap-1 text-slate-500 min-w-[4rem]">' +
        '<div class="p-2 rounded-xl transition-colors ' +
        (state.activeTab < tripData.length ? "bg-blue-100 text-blue-900" : "opacity-40") +
        '"><i class="fas fa-chevron-right text-lg" aria-hidden="true"></i></div>' +
        '<span class="text-[10px] font-bold uppercase tracking-wide">Avanti</span></button></div></nav></div>';

      document.getElementById("trip-app-root").innerHTML = root;
    }

    render();
  </script>
</body>
</html>
