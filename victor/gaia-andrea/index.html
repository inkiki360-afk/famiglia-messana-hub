<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaia &amp; Andrea — Planning Operativo | Spazio Victor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.25s ease-out; }
  </style>
</head>
<body class="bg-slate-50">
  <nav class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-[60]">
    <div class="max-w-4xl mx-auto px-4 py-2 flex flex-wrap gap-2 text-sm font-semibold">
      <a href="../index.html" class="inline-flex items-center gap-2 rounded-full bg-rose-50 px-3 py-1.5 text-rose-700 border border-rose-200 hover:bg-rose-100 transition-colors">
        <i class="fas fa-arrow-left" aria-hidden="true"></i> Spazio Victor
      </a>
      <a href="/famiglia-messana-hub/index.html" class="inline-flex items-center gap-2 rounded-full bg-slate-100 px-3 py-1.5 text-slate-600 hover:bg-slate-200 transition-colors">
        Home
      </a>
    </div>
  </nav>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    fetch('app.jsx')
      .then(function (res) { return res.text(); })
      .then(function (code) {
        var transformed = Babel.transform(code, { presets: ['react'] }).code;
        eval(transformed);
      })
      .catch(function (err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:2rem;text-align:center;color:#b91c1c;">Errore nel caricamento dell\'app. Ricarica la pagina.</div>';
        console.error(err);
      });
  </script>
</body>
</html>
